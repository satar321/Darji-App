<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة إدارة دارجي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo'; background: #f4f4f4; padding: 20px; text-align: center; }
        .stat-card { background: #001f3f; color: white; padding: 20px; border-radius: 20px; display: inline-block; margin-bottom: 20px; min-width: 200px; }
        table { width: 100%; background: white; border-radius: 15px; overflow: hidden; border-collapse: collapse; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        th { background: #b89c44; color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .map-link { color: blue; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <h1>لوحة التحكم (المدير)</h1>
    <div class="stat-card">
        عدد المشتركين: <h2 id="count">0</h2>
    </div>

    <table id="userTable">
        <thead>
            <tr>
                <th>الاسم</th>
                <th>الهاتف</th>
                <th>الموقع الجغرافي</th>
                <th>وقت الدخول</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const pass = prompt("أدخل رمز الإدارة السري:");
        if (pass === "star2026") { // رمزك الخاص
            const db = JSON.parse(localStorage.getItem('darji_users') || "[]");
            document.getElementById('count').innerText = db.length;
            const tbody = document.querySelector("#userTable tbody");
            
            db.reverse().forEach(u => {
                const row = `<tr>
                    <td>${u.n}</td>
                    <td>${u.p}</td>
                    <td><a class="map-link" href="https://www.google.com/maps?q=${u.l}" target="_blank">📍 عرض الخريطة</a></td>
                    <td>${u.t}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        } else {
            alert("غير مصرح لك!");
            document.body.innerHTML = "خطأ في الدخول";
        }
    </script>
</body>
</html>
