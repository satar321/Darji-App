<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المشرفين</title>
    <style>
        body { margin: 0; background: #002147; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .admin-card { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 500px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; text-align: center; }
        .btn-login { background: #b89344; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .user-item { background: #f9f9f9; padding: 15px; margin: 10px 0; border-radius: 10px; border-right: 5px solid #002147; display: flex; justify-content: space-between; align-items: center; text-align: right; }
        .btn-delete { background: #ff4757; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="admin-card">
    <div id="loginArea">
        <h2 style="color: #002147;">دخول المشرفين</h2>
        <input type="password" id="adminPass" placeholder="أدخل الرمز السري">
        <button class="btn-login" onclick="checkAccess()">دخول</button>
        <br><br>
        <a href="index.html" style="color: #888; text-decoration: none; font-size: 14px;">العودة للرئيسية</a>
    </div>

    <div id="adminContent" class="hidden">
        <h2 style="color: #002147;">قائمة الأسطوات المسجلين</h2>
        <div id="allData">
            </div>
        <hr>
        <button onclick="location.reload()" style="background:#eee; border:none; padding:10px; width:100%; border-radius:10px; cursor:pointer;">تحديث القائمة</button>
    </div>
</div>

<script>
    // الرموز السرية المعتمدة
    const CODES = {
        MASTER: "satar1990", // رمز ستار (المدير)
        ADMIN1: "1122", ADMIN2: "3344", ADMIN3: "5566", ADMIN4: "7788"
    };

    function checkAccess() {
        const pass = document.getElementById('adminPass').value.trim();
        const values = Object.values(CODES);

        if (values.includes(pass)) {
            // إخفاء منطقة الدخول وإظهار المحتوى
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('adminContent').classList.remove('hidden');
            loadAdminData();
        } else {
            alert("الرمز السري خطأ! تأكد من كتابة الرمز الصحيح بدون فراغات.");
        }
    }

    function loadAdminData() {
        const users = JSON.parse(localStorage.getItem('users') || "[]");
        const list = document.getElementById('allData');
        
        if(users.length === 0) {
            list.innerHTML = "<p style='color:#666;'>لا يوجد مستخدمين مسجلين حالياً</p>";
            return;
        }

        list.innerHTML = users.map((u, index) => `
            <div class="user-item">
                <div>
                    <strong>${u.name}</strong>
                    <div style="font-size:12px; color:#b89344;">${u.shop} | ${u.spec}</div>
                    <div style="font-size:11px; color:#888;">📞 ${u.phone} | 📍 ${u.province}</div>
                </div>
                <button class="btn-delete" onclick="deleteUser(${index})">حذف</button>
            </div>
        `).join('');
    }

    function deleteUser(index) {
        if(confirm("هل أنت متأكد من حذف هذا الحساب؟")) {
            let users = JSON.parse(localStorage.getItem('users') || "[]");
            users.splice(index, 1);
            localStorage.setItem('users', JSON.stringify(users));
            loadAdminData(); // تحديث العرض
        }
    }
</script>

</body>
</html>
