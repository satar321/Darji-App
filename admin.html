<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - دارجي</title>
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .admin-container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #002147; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .stat-card { background: #b89344; color: white; padding: 20px; border-radius: 10px; text-align: center; }
        .user-list { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .user-list th, .user-list td { padding: 12px; border: 1px solid #ddd; text-align: right; }
        .btn-action { padding: 5px 10px; border-radius: 5px; cursor: pointer; border: none; }
        .btn-delete { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div id="adminLogin" class="login-overlay">
    <div style="background: white; padding: 30px; border-radius: 20px; text-align: center;">
        <h3>دخول المشرفين</h3>
        <input type="password" id="adminPass" placeholder="أدخل الرمز السري" style="padding: 10px; width: 80%; border-radius: 5px; border: 1px solid #ddd;">
        <br><br>
        <button onclick="checkPass()" style="background: #b89344; color: white; border: none; padding: 10px 30px; border-radius: 10px;">دخول</button>
    </div>
</div>

<div class="admin-container">
    <h2>📊 لوحة تحكم دارجي</h2>
    <hr>
    
    <div class="stats-grid">
        <div class="stat-card">
            <h3>المستخدمين</h3>
            <p id="totalUsers">جارٍ التحميل...</p>
        </div>
        <div class="stat-card">
            <h3>الأسطوات</h3>
            <p id="totalMechanics">جارٍ التحميل...</p>
        </div>
        <div class="stat-card" style="background: #008080;">
            <h3>أكثر محافظة</h3>
            <p id="topProvince">ميسان</p>
        </div>
    </div>

    <h3>📝 قائمة المسجلين الجدد</h3>
    <table class="user-list">
        <thead>
            <tr>
                <th>الاسم</th>
                <th>المحافظة</th>
                <th>المهنة</th>
                <th>إجراء</th>
            </tr>
        </thead>
        <tbody id="userTable">
            </tbody>
    </table>
</div>

<script>
    function checkPass() {
        const pass = document.getElementById('adminPass').value;
        if(pass === "1234") { // يمكنك تغيير الرمز السري من هنا
            document.getElementById('adminLogin').style.display = 'none';
        } else {
            alert("الرمز السري خطأ!");
        }
    }

    // تجربة عرض بيانات وهمية لحين ربط Google Sheets
    window.onload = () => {
        document.getElementById('totalUsers').innerText = "154";
        document.getElementById('totalMechanics').innerText = "42";
        const table = document.getElementById('userTable');
        table.innerHTML = `
            <tr>
                <td>ستار الساعدي</td>
                <td>ميسان</td>
                <td>سائق</td>
                <td><button class="btn-action btn-delete">حظر</button></td>
            </tr>
        `;
    }
</script>
</body>
</html>
