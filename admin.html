<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - دارجي</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .stat-card { background: #001f3f; color: white; padding: 15px; border-radius: 15px; display: inline-block; margin-bottom: 20px; }
        table { width: 100%; background: white; border-radius: 10px; border-collapse: collapse; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        th { background: #b89c44; color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
    </style>
</head>
<body>
    <div id="loginArea" style="margin-top: 100px;">
        <h2>بوابة المشرفين والمدير</h2>
        <input type="password" id="pInput" placeholder="أدخل الرمز السري الخاص" style="padding:10px; border-radius:8px; border:1px solid #ccc;">
        <button onclick="login()" style="padding:10px 20px; background:#b89c44; color:white; border:none; border-radius:8px; cursor:pointer;">دخول</button>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="stat-card">المستخدمين المسجلين: <b id="total">0</b></div>
        <table id="uTable">
            <thead>
                <tr>
                    <th>الاسم</th>
                    <th>الفئة</th>
                    <th>المهنة</th>
                    <th>الموقع</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        // رموز معقدة ومختلفة للمشرفين والمدير
        const keys = {
            "Star@Master#2026": "المدير العام",
            "M1_Z_99X": "المشرف 1",
            "M2_R_77Y": "المشرف 2",
            "M3_M_44Z": "المشرف 3",
            "M4_B_11W": "المشرف 4"
        };

        function login() {
            const pass = document.getElementById('pInput').value;
            if (keys[pass]) {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadUsers(pass === "Star@Master#2026");
            } else { alert("الرمز غير صحيح!"); }
        }

        function loadUsers(isAdmin) {
            const data = JSON.parse(localStorage.getItem('darji_final') || "[]");
            document.getElementById('total').innerText = data.length;
            const body = document.querySelector("#uTable tbody");
            data.reverse().forEach(u => {
                const map = isAdmin ? `<a href="https://www.google.com/maps?q=${u.loc}" target="_blank">📍 عرض</a>` : "🔒 محجوب";
                body.innerHTML += `<tr><td>${u.name}</td><td>${u.type}</td><td>${u.job}</td><td>${map}</td></tr>`;
            });
        }
    </script>
</body>
</html>
