<script>
    // هذه هي الرموز الأربعة مع رمز ستار
    const CODES = {
        MASTER: "satar1990", 
        ADMIN1: "1122", ADMIN2: "3344", ADMIN3: "5566", ADMIN4: "7788"
    };

    function checkAccess() {
        const pass = document.getElementById('adminPass').value.trim();
        const values = Object.values(CODES);

        if (values.includes(pass)) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            
            // ميزة ستار الخاصة بالمسح الشامل
            if (pass === CODES.MASTER) {
                document.getElementById('masterDeleteBtn').style.display = 'block';
            }
            loadAdminData();
        } else {
            alert("الرمز السري خطأ! تأكد من كتابة الرمز الصحيح.");
        }
    }
</script>
