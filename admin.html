<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المشرفين - دارجي</title>
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .admin-box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        .user-row { background: #fff; padding: 12px; margin: 10px 0; border-radius: 10px; border-right: 5px solid #002147; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-delete { background: #ff4757; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        input { padding: 12px; width: 85%; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd; text-align: center; font-size: 16px; }
        .btn-login { padding: 12px 30px; background: #002147; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .master-panel { display: none; }
        .delete-all { background: red; color: white; border: none; padding: 15px; border-radius: 10px; margin-top: 20px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div id="loginArea" class="admin-box">
    <h2 style="color: #002147;">🔒 دخول المشرفين</h2>
    <p style="font-size: 13px; color: #666;">يرجى إدخال رمز الوصول الخاص بك</p>
    <input type="password" id="adminPass" placeholder="الرمز السري">
    <button onclick="checkAccess()" class="btn-login">دخول النظام</button>
</div>

<div id="adminContent" class="master-panel">
    <h2 style="color: #002147;">لوحة إدارة تطبيق دارجي</h2>
    <div id="allData"></div>
    
    <button id="masterDeleteBtn" class="delete-all" style="display:none;" onclick="confirmMasterDelete()">⚠️ مسح قاعدة البيانات بالكامل (صلاحية ستار)</button>
</div>

<script>
    // --- قسم الرموز (تستطيع تغييرها من هنا) ---
    const CODES = {
        MASTER: "satar1990", // رمز ستار
        ADMIN1: "1122",     // مشرف 1
        ADMIN2: "3344",     // مشرف 2
        ADMIN3: "5566",     // مشرف 3
        ADMIN4: "7788"      // مشرف 4
    };

    function checkAccess() {
        const pass = document.getElementById('adminPass').value;
        const values = Object.values(CODES);

        if (values.includes(pass)) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            
            // إذا كان الداخل هو ستار، يظهر له زر المسح الشامل
            if (pass === CODES.MASTER) {
                document.getElementById('masterDeleteBtn').style.display = 'block';
            }
            loadAdminData();
        } else {
            alert("الرمز غير صحيح، يرجى التأكد من الرمز الخاص بك.");
        }
    }

    function loadAdminData() {
        const users = JSON.parse(localStorage.getItem('users') || "[]");
        const list = document.getElementById('allData');
        
        if(users.length === 0) {
            list.innerHTML = "<p>لا يوجد مستخدمين حالياً</p>";
            return;
        }

        list.innerHTML = users.map((u, index) => `
            <div class="user-row">
                <div style="text-align: right;">
                    <strong style="display:block;">${u.name}</strong>
                    <span style="font-size:11px; color:#b89344;">${u.shop} - ${u.spec}</span>
                </div>
                <button class="btn-delete" onclick="deleteUser(${index})">حذف</button>
            </div>
        `).join('');
    }

    function deleteUser(index) {
        if(confirm("هل أنت متأكد من حذف هذا الحساب؟")) {
            let users = JSON.parse(localStorage.getItem('users') || "[]");
            users.splice(index, 1);
            localStorage.setItem('users', JSON.stringify(users));
            loadAdminData();
        }
    }

    function confirmMasterDelete() {
        if(confirm("تحذير: سيتم مسح كافة الأسطوات والسائقين من النظام! هل أنت متأكد؟")) {
            localStorage.removeItem('users');
            loadAdminData();
        }
    }
</script>
</body>
</html>
