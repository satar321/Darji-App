<script>
    // هذه هي الرموز المعتمدة (تأكد أنها مطابقة لما تكتبه)
    const CODES = {
        MASTER: "satar1990", 
        ADMIN1: "1122",     
        ADMIN2: "3344",     
        ADMIN3: "5566",     
        ADMIN4: "7788"      
    };

    function checkAccess() {
        // .trim() تحذف أي فراغ زائد قد يضيفه الكيبورد تلقائياً
        const pass = document.getElementById('adminPass').value.trim();
        const values = Object.values(CODES);

        if (values.includes(pass)) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            
            // تفعيل ميزات المدير إذا كان الرمز هو satar1990
            if (pass === CODES.MASTER) {
                document.getElementById('masterDeleteBtn').style.display = 'block';
            }
            loadAdminData();
        } else {
            alert("الرمز السري خطأ! تأكد من كتابة satar1990 بحروف صغيرة");
        }
    }
</script>
