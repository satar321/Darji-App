<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة دارجي - نظام المشرفين</title>
    <style>
        body { font-family: 'Cairo'; text-align: center; background: #f4f4f4; }
        .admin-box { background: #001f3f; color: white; padding: 20px; margin: 20px; border-radius: 15px; }
        table { width: 90%; margin: auto; background: white; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div id="loginArea">
        <h2>تسجيل دخول المشرفين</h2>
        <input type="password" id="adminPass" placeholder="أدخل رمز المرور">
        <button onclick="checkAdmin()">دخول</button>
    </div>

    <div id="panel" style="display:none;">
        <div class="admin-box">
            <h3>إحصائيات النظام</h3>
            <p>عدد المستخدمين: <b id="userCount">0</b></p>
        </div>
        <table id="dataTable">
            <thead>
                <tr>
                    <th>الاسم</th>
                    <th>النوع</th>
                    <th>المهنة</th>
                    <th>الموقع</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const passwords = {
            "star2026": "مدير عام",
            "m111": "مشرف 1",
            "m222": "مشرف 2",
            "m333": "مشرف 3",
            "m444": "مشرف 4"
        };

        function checkAdmin() {
            const p = document.getElementById('adminPass').value;
            if (passwords[p]) {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                loadData(p === "star2026");
            } else { alert("الرمز خطأ!"); }
        }

        function loadData(isFull) {
            const db = JSON.parse(localStorage.getItem('darji_db') || "[]");
            document.getElementById('userCount').innerText = db.length;
            const tbody = document.querySelector("#dataTable tbody");
            
            db.forEach(u => {
                const mapLink = isFull ? `<a href="https://www.google.com/maps?q=${u.loc}" target="_blank">📍 عرض</a>` : "مخفي";
                tbody.innerHTML += `<tr><td>${u.name}</td><td>${u.type}</td><td>${u.job}</td><td>${mapLink}</td></tr>`;
            });
        }
    </script>
</body>
</html>
