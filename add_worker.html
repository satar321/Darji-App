<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة أسطى جديد</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; text-align: center; }
        .form-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 95%; padding: 12px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .btn-save { background-color: #002d5b; }
        .btn-gps { background-color: #ff9800; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>تسجيل أسطى جديد 🛠️</h2>
        <input type="text" id="name" placeholder="اسم الأسطى">
        <input type="text" id="job" placeholder="المهنة">
        <input type="text" id="phone" placeholder="رقم الموبايل">
        <button class="btn-gps" onclick="getLocation()">📍 تحديد موقعي الحالي</button>
        <p id="loc-text" style="color: gray; font-size: 12px;">الموقع غير محدد</p>
        <button class="btn-save" onclick="saveWorker()">حفظ البيانات</button>
        <p id="status"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDING7DzLK9YwWtdBt1CLJhFPOqRrCBo8s",
            authDomain: "darji-app-13348.firebaseapp.com",
            databaseURL: "https://darji-app-13348-default-rtdb.firebaseio.com",
            projectId: "darji-app-13348",
            storageBucket: "darji-app-13348.firebasestorage.app",
            messagingSenderId: "553323569740",
            appId: "1:553323569740:web:57075700fe68af3d010ae9",
            measurementId: "G-CS76QJJ60J"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let lat = "31.83", lng = "47.14"; // إحداثيات افتراضية للعمارة

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    lat = pos.coords.latitude;
                    lng = pos.coords.longitude;
                    document.getElementById('loc-text').innerText = "✅ تم تحديد موقعك";
                });
            }
        }

        function saveWorker() {
            const name = document.getElementById('name').value;
            const job = document.getElementById('job').value;
            const phone = document.getElementById('phone').value;
            
            if(name && job && phone) {
                database.ref('workers').push().set({
                    name: name,
                    job: job,
                    phone: phone,
                    lat: lat,
                    lng: lng
                }).then(() => {
                    document.getElementById('status').innerText = "✅ تم الحفظ بنجاح!";
                });
            }
        }
    </script>
</body>
</html>
