<script>
    // ... كود الاتصال بـ Firebase ...
    function saveWorker() {
        const name = document.getElementById('name').value;
        const job = document.getElementById('job').value;
        const phone = document.getElementById('phone').value;

        if(name && job && phone) {
            // نرسل البيانات إلى صندوق اسمه 'workers' ليتطابق مع صفحة العرض
            database.ref('workers').push().set({
                name: name,
                job: job,
                phone: phone,
                lat: "31.83", // إحداثيات العمارة الافتراضية
                lng: "47.14"
            }).then(() => {
                alert("✅ تم الحفظ بنجاح! تفقد الصفحة الرئيسية الآن.");
            });
        }
    }
</script>
