<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة أسطى جديد</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .box { background: white; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 95%; padding: 12px; background: #002d5b; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>إضافة أسطى جديد 🛠️</h2>
        <input type="text" id="name" placeholder="اسم الأسطى">
        <input type="text" id="job" placeholder="المهنة">
        <input type="text" id="phone" placeholder="رقم الموبايل">
        <button onclick="save()">حفظ في الدليل</button>
        <p id="status"></p>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDING7DzLK9YwWtdBt1CLJhFPOqRrCBo8s",
            authDomain: "darji-app-13348.firebaseapp.com",
            databaseURL: "https://darji-app-13348-default-rtdb.firebaseio.com",
            projectId: "darji-app-13348",
            storageBucket: "darji-app-13348.firebasestorage.app",
            messagingSenderId: "553323569740",
            appId: "1:553323569740:web:57075700fe68af3d010ae9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function save() {
            const name = document.getElementById('name').value;
            const job = document.getElementById('job').value;
            const phone = document.getElementById('phone').value;
            if(name && job && phone) {
                db.ref('workers').push().set({ name, job, phone }).then(() => {
                    document.getElementById('status').innerText = "✅ تم الحفظ بنجاح!";
                });
            }
        }
    </script>
</body>
</html>
