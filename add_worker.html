<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل أسطى</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body style="font-family:sans-serif; text-align:center; padding:20px; background:#f4f4f4;">
    <div style="background:white; padding:20px; border-radius:15px; max-width:400px; margin:auto; box-shadow:0 4px 8px rgba(0,0,0,0.1);">
        <h2>تسجيل أسطى جديد 👷‍♂️</h2>
        <input type="text" id="name" placeholder="اسمك الكامل" style="width:90%; padding:10px; margin:10px; border-radius:5px; border:1px solid #ccc;">
        <input type="text" id="job" placeholder="مهنتك (مثلاً: ميكانيكي)" style="width:90%; padding:10px; margin:10px; border-radius:5px; border:1px solid #ccc;">
        <input type="text" id="phone" placeholder="رقم الموبايل" style="width:90%; padding:10px; margin:10px; border-radius:5px; border:1px solid #ccc;">
        <button onclick="register()" style="width:95%; padding:15px; background:#002d5b; color:white; border:none; border-radius:10px; font-weight:bold;">تسجيل وحفظ بياناتي</button>
        <p id="status"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDING7DzLK9YwWtdBt1CLJhFPOqRrCBo8s",
            authDomain: "darji-app-13348.firebaseapp.com",
            databaseURL: "https://darji-app-13348-default-rtdb.firebaseio.com",
            projectId: "darji-app-13348",
            storageBucket: "darji-app-13348.firebasestorage.app",
            messagingSenderId: "553323569740",
            appId: "1:553323569740:web:57075700fe68af3d010ae9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function register() {
            const name = document.getElementById('name').value;
            const job = document.getElementById('job').value;
            const phone = document.getElementById('phone').value;
            const status = document.getElementById('status');

            if(name && job && phone) {
                status.innerText = "⏳ جاري حفظ الموقع والبيانات...";
                
                // سحب الموقع وحفظ البيانات تلقائياً
                navigator.geolocation.getCurrentPosition((pos) => {
                    db.ref('workers').push().set({
                        name, job, phone, 
                        lat: pos.coords.latitude, 
                        lng: pos.coords.longitude
                    }).then(() => {
                        status.innerText = "✅ تم تسجيلك بنجاح وبياناتك محفوظة!";
                    });
                }, () => {
                    // إذا رفض الـ GPS، نحفظ بموقع العمارة الافتراضي لكي لا يفشل التسجيل
                    db.ref('workers').push().set({
                        name, job, phone, lat: "31.83", lng: "47.14"
                    }).then(() => {
                        status.innerText = "✅ تم التسجيل (بموقع افتراضي)";
                    });
                });
            }
        }
    </script>
</body>
</html>
