<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة أسطى - ديرتك</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; text-align: center; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn { width: 95%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; color: white; margin: 5px 0; }
        .btn-save { background-color: #002d5b; }
    </style>
</head>
<body>

    <div class="box">
        <h2>تسجيل أسطى جديد 👷‍♂️</h2>
        <input type="text" id="name" placeholder="اسم الأسطى">
        <input type="text" id="job" placeholder="المهنة (مثلاً: ميكانيكي)">
        <input type="text" id="phone" placeholder="رقم الموبايل">
        <p style="font-size: 13px; color: #666;">سيتم إضافة موقعك (العمارة) تلقائياً</p>
        <button class="btn btn-save" onclick="saveWorker()">حفظ ونشر في الدليل</button>
        <p id="msg"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDING7DzLK9YwWtdBt1CLJhFPOqRrCBo8s",
            authDomain: "darji-app-13348.firebaseapp.com",
            databaseURL: "https://darji-app-13348-default-rtdb.firebaseio.com",
            projectId: "darji-app-13348",
            storageBucket: "darji-app-13348.firebasestorage.app",
            messagingSenderId: "553323569740",
            appId: "1:553323569740:web:57075700fe68af3d010ae9",
            measurementId: "G-CS76QJJ60J"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function saveWorker() {
            const name = document.getElementById('name').value;
            const job = document.getElementById('job').value;
            const phone = document.getElementById('phone').value;
            const msg = document.getElementById('msg');

            if(name && job && phone) {
                // نرسل البيانات بنفس الأسماء التي يتوقعها كود العرض (lat و lng)
                db.ref('workers').push().set({
                    name: name,
                    job: job,
                    phone: phone,
                    lat: "31.83", // موقع افتراضي للعمارة لسهولة الحفظ
                    lng: "47.14"
                }).then(() => {
                    msg.style.color = "green";
                    msg.innerText = "✅ تم الحفظ! اذهب للصفحة الثانية لتراها.";
                    document.getElementById('name').value = '';
                    document.getElementById('job').value = '';
                    document.getElementById('phone').value = '';
                });
            } else {
                msg.innerText = "⚠️ أكمل البيانات أولاً!";
            }
        }
    </script>
</body>
</html>
