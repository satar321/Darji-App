<script>
    // ... تأكد من استخدام إعدادات Firebase الخاصة بك هنا ...
    function saveWorker() {
        const name = document.getElementById('name').value;
        const job = document.getElementById('job').value;
        const phone = document.getElementById('phone').value;

        if(name && job && phone) {
            // نرسل البيانات لصندوق 'workers' لضمان قراءتها في الصفحة الرئيسية
            database.ref('workers').push().set({
                name: name,
                job: job,
                phone: phone,
                lat: "31.83", // إحداثيات العمارة الافتراضية
                lng: "47.14"
            }).then(() => {
                alert("✅ تم الحفظ! جرب تحديث الصفحة الرئيسية الآن.");
            });
        }
    }
</script>
