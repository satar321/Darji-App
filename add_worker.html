<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة أسطى</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body style="font-family:sans-serif; text-align:center; padding:20px;">
    <h2>إضافة أسطى وموقعه 🛠️</h2>
    <input type="text" id="name" placeholder="اسم الأسطى" style="width:80%; padding:10px; margin:10px;">
    <input type="text" id="job" placeholder="المهنة" style="width:80%; padding:10px; margin:10px;">
    <input type="text" id="phone" placeholder="الموبايل" style="width:80%; padding:10px; margin:10px;">
    <button onclick="save()" style="width:85%; padding:15px; background:#002d5b; color:white; border-radius:10px;">حفظ المعلومات والموقع</button>
    <p id="st"></p>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDING7DzLK9YwWtdBt1CLJhFPOqRrCBo8s",
            authDomain: "darji-app-13348.firebaseapp.com",
            databaseURL: "https://darji-app-13348-default-rtdb.firebaseio.com",
            projectId: "darji-app-13348",
            storageBucket: "darji-app-13348.firebasestorage.app",
            messagingSenderId: "553323569740",
            appId: "1:553323569740:web:57075700fe68af3d010ae9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function save() {
            const name = document.getElementById('name').value;
            const job = document.getElementById('job').value;
            const phone = document.getElementById('phone').value;
            if(name && job && phone) {
                // نأخذ موقع العمارة الافتراضي لضمان الحفظ السريع
                db.ref('workers').push().set({
                    name: name,
                    job: job,
                    phone: phone,
                    lat: "31.83", 
                    lng: "47.14"
                }).then(() => {
                    document.getElementById('st').innerText = "✅ تم الحفظ! اذهب للصفحة الثانية الآن.";
                });
            }
        }
    </script>
</body>
</html>
