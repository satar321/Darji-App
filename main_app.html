<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دارجي - القائمة</title>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .header { background: #002147; color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .card { background: white; padding: 15px; margin: 15px; border-radius: 15px; border-right: 6px solid #b89344; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-call { background: #008080; color: white; padding: 10px; border-radius: 8px; text-decoration: none; font-size: 14px; }
        .map-link { color: #b89344; font-size: 12px; display: block; margin-top: 5px; text-decoration: none; font-weight: bold; }
        .online-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; display: inline-block; margin-left: 5px; }
    </style>
</head>
<body>

<div class="header"><h3>أسطوات ديرتك</h3></div>
<div id="list"></div>

<script>
    const users = JSON.parse(localStorage.getItem('users') || "[]");
    const mechanics = users.filter(u => u.role === 'mechanic');
    
    document.getElementById('list').innerHTML = mechanics.map(u => `
        <div class="card">
            <div>
                <strong><span class="online-dot"></span>الأسطى ${u.name} (${u.spec})</strong>
                <p style="font-size:12px; color:#666; margin:5px 0;">📍 محافظة ${u.province}</p>
                <a href="https://www.google.com/maps?q=${u.lat},${u.lng}" target="_blank" class="map-link">📍 عرض الموقع على الخريطة</a>
            </div>
            <a href="tel:${u.phone}" class="btn-call">اتصال</a>
        </div>
    `).reverse().join('');
</script>
</body>
</html>
