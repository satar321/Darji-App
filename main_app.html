<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الأسطوات</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        .card { background: white; padding: 15px; margin: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-right: 5px solid #002d5b; }
        .btn { display: block; text-align: center; padding: 10px; margin-top: 5px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; }
    </style>
</head>
<body style="background:#f4f4f4; padding:10px;">
    <div style="background:#002d5b; color:white; padding:15px; border-radius:10px; text-align:center;">
        <h1>دليل أسطوات ديرتك 👷‍♂️</h1>
    </div>
    <div id="list"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDING7DzLK9YwWtdBt1CLJhFPOqRrCBo8s",
            authDomain: "darji-app-13348.firebaseapp.com",
            databaseURL: "https://darji-app-13348-default-rtdb.firebaseio.com",
            projectId: "darji-app-13348",
            storageBucket: "darji-app-13348.firebasestorage.app",
            messagingSenderId: "553323569740",
            appId: "1:553323569740:web:57075700fe68af3d010ae9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('workers').on('value', (s) => {
            const div = document.getElementById('list');
            div.innerHTML = '';
            s.forEach((child) => {
                const d = child.val();
                div.innerHTML += `
                    <div class="card">
                        <h3>الأسطى: ${d.name}</h3>
                        <p>🔧 المهنة: ${d.job}</p>
                        <a href="tel:${d.phone}" class="btn" style="background:#28a745;">📞 إتصل بالأسطى</a>
                        <a href="https://www.google.com/maps?q=${d.lat},${d.lng}" target="_blank" class="btn" style="background:#ff9800;">📍 موقع الأسطى (الخريطة)</a>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
