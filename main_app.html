<script>
    // ... تأكد من استخدام إعدادات Firebase الخاصة بك هنا ...
    database.ref('workers').on('value', (snapshot) => {
        const listDiv = document.getElementById('workers-list');
        listDiv.innerHTML = '';
        if (snapshot.exists()) {
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                listDiv.innerHTML += `
                    <div class="card">
                        <h3>الأسطى: ${data.name}</h3>
                        <p>🔧 المهنة: ${data.job}</p>
                        <a href="tel:${data.phone}" class="btn-phone">📞 إتصل بالأسطى</a>
                        <a href="https://www.google.com/maps?q=${data.lat},${data.lng}" target="_blank" class="btn-map">📍 موقع الأسطى على الخريطة</a>
                    </div>
                `;
            });
        } else {
            // في حال لم تكن هناك بيانات بعد
            listDiv.innerHTML = '<p style="text-align:center;">لا يوجد أسطوات مسجلين حالياً. كن أول من يضيف!</p>';
        }
    });
</script>
