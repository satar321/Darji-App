<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل أسطوات ديرتك</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 15px; }
        .header { background: linear-gradient(135deg, #002d5b, #0056b3); color: white; padding: 25px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-right: 5px solid #002d5b; text-align: right; }
        .card h3 { margin: 0; color: #333; }
        .card p { margin: 5px 0; color: #666; font-size: 14px; }
        .phone-btn { display: inline-block; margin-top: 10px; padding: 8px 15px; background: #28a745; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .loading { text-align: center; color: #888; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>دليل أسطوات ديرتك 👷‍♂️</h1>
        <p>كل الأسطوات في جيبك</p>
    </div>

    <div id="workers-list">
        <p class="loading">جاري جلب الأسطوات من القاعدة...</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDING7DzLK9YwWtdBt1CLJhFPOqRrCBo8s",
            authDomain: "darji-app-13348.firebaseapp.com",
            databaseURL: "https://darji-app-13348-default-rtdb.firebaseio.com",
            projectId: "darji-app-13348",
            storageBucket: "darji-app-13348.firebasestorage.app",
            messagingSenderId: "553323569740",
            appId: "1:553323569740:web:57075700fe68af3d010ae9",
            measurementId: "G-CS76QJJ60J"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const listDiv = document.getElementById('workers-list');

        database.ref('workers').on('value', (snapshot) => {
            listDiv.innerHTML = '';
            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    listDiv.innerHTML += `
                        <div class="card">
                            <h3>${data.name}</h3>
                            <p>🔧 المهنة: <strong>${data.job}</strong></p>
                            <a href="tel:${data.phone}" class="phone-btn">📞 إتصل بالأسطى</a>
                        </div>
                    `;
                });
            } else {
                listDiv.innerHTML = '<div class="card"><p>لا يوجد أسطوات مسجلين حالياً. كن أول من يضيف!</p></div>';
            }
        });
    </script>
</body>
</html>
