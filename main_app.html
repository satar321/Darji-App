<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل أسطوات ديرتك</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 15px; }
        .header { background: linear-gradient(135deg, #002d5b, #0056b3); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-right: 5px solid #002d5b; }
        .btn { display: block; text-align: center; padding: 10px; margin-top: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; color: white; }
        .btn-phone { background-color: #28a745; }
        .btn-map { background-color: #ff9800; }
    </style>
</head>
<body>

    <div class="header">
        <h1>دليل أسطوات ديرتك 👷‍♂️</h1>
    </div>

    <div id="workers-list">
        </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDING7DzLK9YwWtdBt1CLJhFPOqRrCBo8s",
            authDomain: "darji-app-13348.firebaseapp.com",
            databaseURL: "https://darji-app-13348-default-rtdb.firebaseio.com",
            projectId: "darji-app-13348",
            storageBucket: "darji-app-13348.firebasestorage.app",
            messagingSenderId: "553323569740",
            appId: "1:553323569740:web:57075700fe68af3d010ae9",
            measurementId: "G-CS76QJJ60J"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('workers').on('value', (snapshot) => {
            const listDiv = document.getElementById('workers-list');
            listDiv.innerHTML = '';
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                // هنا السحر: نضع الاسم والمهنة وزر الاتصال وزر الموقع
                listDiv.innerHTML += `
                    <div class="card">
                        <h3>الأسطى: ${data.name}</h3>
                        <p>🔧 المهنة: ${data.job}</p>
                        <a href="tel:${data.phone}" class="btn btn-phone">📞 إتصل بالأسطى</a>
                        <a href="https://www.google.com/maps?q=${data.lat || '31.83'},${data.lng || '47.14'}" class="btn btn-map">📍 موقع الأسطى (العمارة)</a>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
