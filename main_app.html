<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دارجي - قائمة الأسطوات</title>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .header { background: #002147; color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .container { padding: 12px; }
        .card { 
            background: white; padding: 15px; margin-bottom: 12px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-right: 6px solid #b89344;
        }
        .info strong { display: block; color: #002147; font-size: 16px; }
        .info p { margin: 3px 0; font-size: 13px; color: #666; }
        .shop-tag { color: #b89344; font-weight: bold; font-size: 14px; display: block; margin-top: 2px; }
        .btn-call { background: #008080; color: white; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 14px; }
        .map-btn { color: #b89344; font-size: 12px; text-decoration: none; font-weight: bold; display: block; margin-top: 8px; }
        .online-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; display: inline-block; margin-left: 5px; box-shadow: 0 0 5px #2ecc71; }
    </style>
</head>
<body>

<div class="header"><h3>دليل أسطوات ديرتك</h3></div>
<div class="container" id="list"></div>

<script>
    window.onload = function() {
        const users = JSON.parse(localStorage.getItem('users') || "[]");
        const mechanics = users.filter(u => u.role === 'mechanic');
        const listDiv = document.getElementById('list');

        if(mechanics.length === 0) {
            listDiv.innerHTML = '<p style="text-align:center; color:#999; margin-top:50px;">لا يوجد أسطوات مسجلين حالياً</p>';
            return;
        }

        listDiv.innerHTML = mechanics.map(u => `
            <div class="card">
                <div class="info">
                    <strong><span class="online-dot"></span>الأسطى ${u.name}</strong>
                    <span class="shop-tag">🏪 ${u.shop} (${u.spec})</span>
                    <p>🏠 العنوان: ${u.address}</p>
                    <p>📍 محافظة ${u.province}</p>
                    <a href="https://www.google.com/maps?q=${u.lat},${u.lng}" target="_blank" class="map-btn">📍 عرض موقع المحل على الخريطة</a>
                </div>
                <a href="tel:${u.phone}" class="btn-call">اتصال</a>
            </div>
        `).reverse().join('');
    }
</script>
</body>
</html>
