<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دارجي - القائمة</title>
    <style>
        body { background: #f4f7f6; font-family: sans-serif; margin: 0; }
        .header { background: #002147; color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .card { background: white; margin: 15px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-right: 6px solid #b89344; }
        .info strong { color: #002147; font-size: 16px; display: block; }
        .map-link { color: #b89344; text-decoration: none; font-size: 12px; font-weight: bold; display: block; margin-top: 5px; }
        .btn-call { background: #008080; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-weight: bold; }
        .online-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; display: inline-block; margin-left: 5px; }
    </style>
</head>
<body>
<div class="header"><h3>أسطوات ديرتك</h3></div>
<div id="usersList"></div>

<script>
    window.onload = function() {
        const allUsers = JSON.parse(localStorage.getItem('allUsers') || "[]");
        const mechanics = allUsers.filter(u => u.role === 'mechanic');
        document.getElementById('usersList').innerHTML = mechanics.map(u => `
            <div class="card">
                <div>
                    <strong><span class="online-dot"></span>الأسطى ${u.name} (${u.specialty})</strong>
                    <p style="margin:2px 0; font-size:13px; color:#666;">📍 ${u.province}</p>
                    <a href="https://www.google.com/maps?q=${u.lat},${u.lng}" target="_blank" class="map-link">📍 موقع الأسطى على الخريطة</a>
                </div>
                <a href="tel:${u.phone}" class="btn-call">اتصال</a>
            </div>
        `).reverse().join('');
    }
</script>
</body>
</html>
