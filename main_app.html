<div id="usersList"></div>

<script>
    window.onload = function() {
        const listDiv = document.getElementById('usersList');
        const allUsers = JSON.parse(localStorage.getItem('allUsers') || "[]");
        
        listDiv.innerHTML = allUsers.map(user => `
            <div class="card">
                <div>
                    <span class="online-dot"></span>
                    <strong>${user.name} (${user.specialty || user.role})</strong>
                    <p>📍 ${user.province}</p>
                </div>
                <a href="tel:${user.phone}" class="btn-call">اتصال</a>
            </div>
        `).join('');
    }
</script>
