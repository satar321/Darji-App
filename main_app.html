<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل أسطوات ديرتك</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        .header { background-color: #002d5b; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; margin: 10px auto; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <h1>دليل أسطوات ديرتك</h1>
    </div>

    <div id="workers-list">
        <p class="loading">جاري تحميل قائمة الأسطوات...</p>
    </div>

    <script>
        // إعدادات Firebase الخاصة بك التي ظهرت في الصورة
        const firebaseConfig = {
            apiKey: "AIzaSyDING7DzLK9YwWtdBt1CLJhFPOqRrCBo8s",
            authDomain: "darji-app-13348.firebaseapp.com",
            databaseURL: "https://darji-app-13348-default-rtdb.firebaseio.com",
            projectId: "darji-app-13348",
            storageBucket: "darji-app-13348.firebasestorage.app",
            messagingSenderId: "553323569740",
            appId: "1:553323569740:web:57075700fe68af3d010ae9"
        };

        // تشغيل Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // جلب البيانات من قاعدة البيانات
        const workersRef = database.ref('workers');
        workersRef.on('value', (snapshot) => {
            const listDiv = document.getElementById('workers-list');
            listDiv.innerHTML = ''; // مسح رسالة التحميل

            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    listDiv.innerHTML += `
                        <div class="card">
                            <h3>${data.name}</h3>
                            <p>المهنة: ${data.job}</p>
                            <p>الهاتف: ${data.phone}</p>
                        </div>
                    `;
                });
            } else {
                listDiv.innerHTML = '<p>لا يوجد أسطوات مسجلين حالياً.</p>';
            }
        });
    </script>
</body>
</html>
