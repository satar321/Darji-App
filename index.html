<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق دارجي - النسخة الكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #001f3f url('logo.png') no-repeat center center fixed; background-size: contain; font-family: 'Cairo', sans-serif; margin: 0; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .overlay { background: rgba(0, 31, 63, 0.96); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .card { background: white; color: #333; padding: 15px; border-radius: 20px; width: 92%; max-width: 450px; text-align: center; margin-top: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .input-field { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; font-family: 'Cairo'; text-align: center; box-sizing: border-box; }
        .btn-main { background: #b89c44; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        /* واجهة التواصل الاجتماعي */
        .tab-bar { display: flex; justify-content: space-around; background: #001f3f; padding: 10px; border-radius: 15px; margin-bottom: 10px; }
        .tab-btn { color: #b89c44; cursor: pointer; font-weight: bold; font-size: 13px; }
        .post-area { background: #f0f2f5; border-radius: 15px; padding: 10px; margin-top: 15px; text-align: right; }
        .post-input { width: 100%; border: none; border-radius: 10px; padding: 10px; margin-bottom: 5px; resize: none; font-family: 'Cairo'; }
        .post-card { background: white; border-radius: 12px; padding: 10px; margin-top: 10px; border: 1px solid #eee; text-align: right; }
        .chat-item { background: #e8f5e9; padding: 10px; border-radius: 10px; margin: 5px 0; display: flex; justify-content: space-between; font-size: 13px; }

        #loader, #socialPage { display: none; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #b89c44; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="card" id="regPage">
        <img src="logo.png" style="width:80px; border-radius:12px; margin-bottom:10px;">
        <h3 style="color:#001f3f; margin:0;">تطبيق دارجي العراقي</h3>
        
        <input type="text" id="uName" class="input-field" placeholder="الاسم الكامل">
        <input type="tel" id="uPhone" class="input-field" placeholder="رقم الهاتف (الواتساب)">
        
        <div style="text-align: right; width: 100%;">
            <label style="color:#b89c44; font-size:12px; font-weight:bold;">نوع الحساب</label>
            <select id="uType" class="input-field" onchange="toggleJob()">
                <option value="سائق">أنا سائق</option>
                <option value="أسطى">أنا أسطى (ميكانيكي)</option>
            </select>
        </div>

        <div id="jobSection" style="display:none; text-align: right; width: 100%;">
            <label style="color:#b89c44; font-size:12px; font-weight:bold;">التخصص</label>
            <select id="uJob" class="input-field"><option value="فيتر">فيتر</option><option value="كهربائي">كهربائي</option><option value="بنجرجي">بنجرجي</option></select>
        </div>

        <div id="gpsBtn" style="background:#eee; padding:12px; margin:10px 0; border-radius:10px; cursor:pointer; font-weight:bold; color:#001f3f;" onclick="getLoc()">📍 تفعيل الموقع (GPS)</div>
        <button class="btn-main" onclick="startApp()">دخول النظام</button>
    </div>

    <div class="card" id="loader">
        <div class="spinner"></div>
        <h3 id="waitText">جاري تهيئة حسابك...</h3>
    </div>

    <div class="card" id="socialPage">
        <div class="tab-bar">
            <span class="tab-btn" onclick="showSec('feed')">الرئيسية</span>
            <span class="tab-btn" onclick="showSec('friends')">الأصدقاء</span>
            <span class="tab-btn" onclick="showSec('chat')">الرسائل</span>
        </div>

        <div id="sec-feed">
            <div class="post-area">
                <textarea id="postTxt" class="post-input" placeholder="اكتب منشوراً جديداً..."></textarea>
                <button class="btn-main" style="padding:5px;" onclick="addPost()">نشر في دارجي</button>
            </div>
            <div id="feedContent">
                <div class="post-card"><b>إدارة دارجي:</b> أهلاً بكم في مجتمع الميكانيكيين الأول في العراق.</div>
            </div>
        </div>

        <div id="sec-friends" style="display:none;">
            <h4 style="text-align:right;">طلبات صداقة واقتراحات</h4>
            <div class="chat-item"><span>أسطى جبار (ميكانيكي)</span> <button style="font-size:10px;">إضافة</button></div>
            <div class="chat-item"><span>سائق (ميسان)</span> <button style="font-size:10px;">إضافة</button></div>
        </div>

        <div id="sec-chat" style="display:none;">
            <h4 style="text-align:right;">المحادثات الخاصة</h4>
            <div class="chat-item" onclick="alert('سيتم فتح المحادثة...')">💬 محادثة مع أسطى ستار <span>الآن</span></div>
        </div>

        <p style="color:red; font-size:12px; cursor:pointer; margin-top:20px;" onclick="location.reload()">تسجيل خروج</p>
    </div>

    <script>
        function toggleJob() {
            document.getElementById('jobSection').style.display = (document.getElementById('uType').value === 'أسطى') ? 'block' : 'none';
        }

        let coords = "";
        function getLoc() {
            navigator.geolocation.getCurrentPosition(p => {
                coords = p.coords.latitude + "," + p.coords.longitude;
                document.getElementById('gpsBtn').style.background = "#e8f5e9";
                document.getElementById('gpsBtn').innerText = "تم تحديد الموقع ✅";
            }, () => alert("يرجى تفعيل GPS"));
        }

        function startApp() {
            const name = document.getElementById('uName').value;
            const phone = document.getElementById('uPhone').value;
            if(!name || !phone || !coords) return alert("يرجى ملء الاسم والرقم وتفعيل GPS");

            document.getElementById('regPage').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('waitText').innerText = "أهلاً بك يا " + name;

            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('socialPage').style.display = 'block';
            }, 2500);
        }

        function showSec(id) {
            ['feed', 'friends', 'chat'].forEach(s => document.getElementById('sec-'+s).style.display = 'none');
            document.getElementById('sec-'+id).style.display = 'block';
        }

        function addPost() {
            let txt = document.getElementById('postTxt').value;
            if(!txt) return;
            let div = document.createElement('div');
            div.className = 'post-card';
            div.innerHTML = `<b>${document.getElementById('uName').value}:</b><br>${txt}`;
            document.getElementById('feedContent').prepend(div);
            document.getElementById('postTxt').value = "";
        }
    </script>
</body>
</html>
