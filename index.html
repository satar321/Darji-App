<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل أسطوات ديرتك</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 10px; }
        .reg-box { background: #002d5b; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .input-style { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 12px; border-right: 5px solid #002d5b; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-call { display: block; background: #28a745; color: white; text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; margin-top: 10px; }
        .btn-map { display: block; background: #ff9800; color: white; text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="reg-box">
        <h2>سجل كأُسطى جديد 👷‍♂️</h2>
        <input type="text" id="name" class="input-style" placeholder="اسمك الكامل">
        <input type="text" id="job" class="input-style" placeholder="مهنتك">
        <input type="text" id="phone" class="input-style" placeholder="رقم الموبايل">
        <button onclick="autoRegister()" style="width: 95%; padding: 15px; background: #ff9800; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">تسجيل وحفظ بياناتي</button>
        <p id="status" style="font-size: 13px; margin-top: 10px;"></p>
    </div>

    <hr>
    <h3 style="text-align: center; color: #002d5b;">دليل الأسطوات المسجلين</h3>
    <div id="workers-list"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDING7DzLK9YwWtdBt1CLJhFPOqRrCBo8s",
            authDomain: "darji-app-13348.firebaseapp.com",
            databaseURL: "https://darji-app-13348-default-rtdb.firebaseio.com",
            projectId: "darji-app-13348",
            storageBucket: "darji-app-13348.firebasestorage.app",
            messagingSenderId: "553323569740",
            appId: "1:553323569740:web:57075700fe68af3d010ae9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // وظيفة التسجيل التلقائي مع الموقع
        function autoRegister() {
            const name = document.getElementById('name').value;
            const job = document.getElementById('job').value;
            const phone = document.getElementById('phone').value;
            const status = document.getElementById('status');

            if(name && job && phone) {
                status.innerText = "⏳ جاري حفظ موقعك والبيانات...";
                navigator.geolocation.getCurrentPosition((pos) => {
                    db.ref('workers').push().set({
                        name, job, phone, 
                        lat: pos.coords.latitude, 
                        lng: pos.coords.longitude
                    }).then(() => { status.innerText = "✅ تم التسجيل بنجاح!"; });
                }, () => {
                    db.ref('workers').push().set({ name, job, phone, lat: "31.83", lng: "47.14" })
                    .then(() => { status.innerText = "✅ تم التسجيل (بموقع افتراضي)"; });
                });
            }
        }

        // وظيفة عرض البيانات فوراً (تحديث تلقائي)
        db.ref('workers').on('value', (snapshot) => {
            const listDiv = document.getElementById('workers-list');
            listDiv.innerHTML = '';
            snapshot.forEach((child) => {
                const d = child.val();
                listDiv.innerHTML += `
                    <div class="card">
                        <h3>الأسطى: ${d.name}</h3>
                        <p>🔧 المهنة: ${d.job}</p>
                        <a href="tel:${d.phone}" class="btn-call">📞 إتصل بالأسطى</a>
                        <a href="https://www.google.com/maps?q=${d.lat},${d.lng}" target="_blank" class="btn-map">📍 موقع الأسطى على الخريطة</a>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
