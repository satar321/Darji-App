<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دارجي - الدخول</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#002147">
    <style>
        body { margin: 0; padding: 0; background: #002147; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .login-card { background: white; padding: 25px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        /* استخدام الشعار الذي رفعته */
        .logo { width: 120px; margin-bottom: 15px; border-radius: 15px; }
        .install-banner { background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; cursor: pointer; display: none; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .hidden { display: none; }
        .btn-entry { background: #b89344; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-entry:hover { background: #967835; }
        #gpsStatus { font-size: 12px; margin-bottom: 10px; font-weight: bold; }
        .admin-link { display: block; margin-top: 25px; color: #bbb; text-decoration: none; font-size: 11px; }
    </style>
</head>
<body>

<div class="login-card">
    <div id="installBtn" class="install-banner">📥 اضغط هنا لتثبيت "دارجي" على شاشتك</div>
    
    <img src="logo.png" alt="شعار دارجي" class="logo">
    
    <h2 style="color: #002147; margin-top: 0;">نظام دارجي</h2>

    <input type="text" id="userName" placeholder="الاسم الكامل">
    <input type="tel" id="userPhone" placeholder="رقم الهاتف (واتساب)">
    
    <select id="userProvince">
        <option value="">اختر المحافظة...</option>
        <option>ميسان</option>
        <option>بغداد</option>
        <option>البصرة</option>
        <option>ذي قار</option>
        <option>بابل</option>
    </select>

    <select id="userRole" onchange="toggleSpecialty()">
        <option value="driver">أنا سائق (أبحث عن مساعدة)</option>
        <option value="mechanic">أنا أسطى (صاحب مهنة)</option>
    </select>

    <div id="mechanicOptions" class="hidden">
        <select id="specialty">
            <option value="">حدد تخصصك...</option>
            <option>فيتر</option>
            <option>بنجرجي</option>
            <option>مواد احتياطية</option>
            <option>محل زيوت</option>
            <option>غسل سيارات</option>
        </select>
    </div>

    <p id="gpsStatus" style="color: #e74c3c;">⚠️ يرجى تفعيل الموقع (GPS) للمتابعة</p>
    
    <button class="btn-entry" id="loginBtn" onclick="processLogin()">دخول النظام</button>
    
    <a href="admin.html" class="admin-link">⚙️ لوحة تحكم المشرفين</a>
</div>

<script>
    let userCoords = null;

    // طلب صلاحية الموقع فور الدخول
    window.onload = function() {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(function(position) {
                userCoords = position.coords;
                document.getElementById('gpsStatus').innerText = "✅ تم تحديد موقعك بنجاح";
                document.getElementById('gpsStatus').style.color = "#2ecc71";
            }, function(error) {
                alert("تنبيه: يجب تفعيل GPS ليعرف الأسطى موقعك بدقة.");
            });
        }
    };

    function toggleSpecialty() {
        const role = document.getElementById('userRole').value;
        document.getElementById('mechanicOptions').classList.toggle('hidden', role !== 'mechanic');
    }

    function processLogin() {
        const name = document.getElementById('userName').value;
        const province = document.getElementById('userProvince').value;
        
        if(!name || !province) {
            alert("يرجى ملء الاسم والمحافظة أولاً.");
            return;
        }
        
        if(!userCoords) {
            alert("لا يمكن الدخول بدون تفعيل الموقع الجغرافي.");
            return;
        }

        // حفظ البيانات مؤقتاً والانتقال للصفحة الثانية
        localStorage.setItem('userData', JSON.stringify({
            name: name,
            province: province,
            lat: userCoords.latitude,
            lng: userCoords.longitude
        }));
        
        window.location.href = "main_app.html";
    }

    // برمجة زر التحميل (PWA)
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt = null;
            document.getElementById('installBtn').style.display = 'none';
        }
    });
</script>

</body>
</html>
