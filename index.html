<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق دارجي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1486006920555-c77dcf18193c?q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 2px solid #25D366;
        }
        h1 { color: #008080; margin-bottom: 10px; }
        p { color: #555; font-size: 14px; margin-bottom: 25px; }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        button {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { background-color: #128C7E; }
    </style>
</head>
<body>
    <div class="container">
        <h1>تطبيق دارجي</h1>
        <p>سجل بياناتك للانضمام إلى أكبر شبكة في العراق</p>
        <input type="text" id="name" placeholder="الاسم الكامل">
        <select id="type">
            <option value="سائق">سائق</option>
            <option value="أسطى">أسطى</option>
        </select>
        <select id="city">
            <option value="ميسان">ميسان</option>
            <option value="بغداد">بغداد</option>
            <option value="البصرة">البصرة</option>
            </select>
        <input type="tel" id="phone" placeholder="رقم الهاتف">
        <button onclick="sendToWhatsApp()">تفعيل الحساب عبر واتساب</button>
    </div>

    <script>
        function sendToWhatsApp() {
            const name = document.getElementById('name').value;
            const type = document.getElementById('type').value;
            const city = document.getElementById('city').value;
            const phone = document.getElementById('phone').value;
            const message = `طلب انضمام لتطبيق دارجي:%0Aالاسم: ${name}%0Aالفئة: ${type}%0Aالمحافظة: ${city}%0Aالهاتف: ${phone}`;
            window.open(`https://wa.me/9647709094462?text=${message}`, '_blank');
        }
    </script>
</body>
</html>
