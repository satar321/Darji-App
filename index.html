<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل ديرتك - النسخة الاحترافية الشاملة</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'دليل ديرتك','short_name':'ديرتك','start_url':'.','display':'standalone','background_color':'#002d5b','theme_color':'#002d5b','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/1042/1042390.png','sizes':'512x512','type':'image/png'}]}">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#002d5b">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #002d5b;
            --gold: #d4af37;
            --success: #28a745;
            --danger: #e74c3c;
            --bg: #f8f9fa;
            --card-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; 
            background-color: var(--bg); 
            margin: 0; padding: 0; color: #333; 
            line-height: 1.6;
        }

        /* زر تحميل البرنامج العلوي */
        #install-banner { 
            display: none; 
            background: linear-gradient(90deg, var(--gold), #f1c40f); 
            color: var(--primary); 
            text-align: center; 
            padding: 20px; 
            font-weight: 800; 
            cursor: pointer; 
            border: none; 
            width: 100%; 
            font-size: 18px; 
            position: sticky; 
            top: 0; 
            z-index: 9999; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .header { 
            background: linear-gradient(135deg, var(--primary) 0%, #004a99 100%); 
            color: white; 
            padding: 70px 20px; 
            text-align: center; 
            border-bottom-left-radius: 50px; 
            border-bottom-right-radius: 50px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h1 { margin: 0; font-size: 2.5rem; }
        .header p { opacity: 0.9; margin-top: 10px; font-size: 1.1rem; }

        .container { max-width: 550px; margin: -40px auto 0; padding: 20px; position: relative; }

        .card { 
            background: white; 
            padding: 35px; 
            border-radius: 30px; 
            box-shadow: var(--card-shadow); 
            margin-bottom: 30px;
            border: 1px solid rgba(0,0,0,0.02);
        }

        h2 { color: var(--primary); border-right: 6px solid var(--gold); padding-right: 15px; margin-bottom: 25px; }

        input, select, textarea { 
            width: 100%; padding: 18px; margin: 12px 0; border: 2.5px solid #f1f1f1; 
            border-radius: 18px; font-size: 16px; box-sizing: border-box; background: #fafafa;
            transition: 0.3s ease;
        }

        input:focus, select:focus { border-color: var(--primary); outline: none; background: #fff; }

        .btn { 
            width: 100%; padding: 20px; border: none; border-radius: 18px; 
            font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none;
        }

        .btn-main { background: var(--primary); color: white; box-shadow: 0 8px 15px rgba(0,45,91,0.2); }
        .btn-main:active { transform: scale(0.98); }

        /* كرت الأسطى المطور */
        .worker-card { 
            background: white; padding: 30px; margin-bottom: 25px; 
            border-radius: 25px; border-right: 12px solid var(--primary); 
            box-shadow: var(--card-shadow); 
        }

        .stars { color: var(--gold); font-size: 26px; margin: 10px 0; }
        .btn-call { background: var(--success); color: white; margin-top: 15px; }
        .btn-map { background: #ff9800; color: white; margin-top: 10px; font-size: 15px; }

        /* زر الإدارة العائم */
        .admin-trigger { 
            position: fixed; bottom: 30px; left: 30px; width: 70px; height: 70px; 
            background: var(--primary); color: white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; cursor: pointer; z-index: 1000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 4px solid white;
        }

        /* لوحة الإدارة الشاملة */
        #admin-panel { 
            display: none; background: white; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; z-index: 9999; overflow-y: auto; 
            padding: 50px 20px; box-sizing: border-box; 
        }

        .admin-stat { 
            background: var(--primary); color: white; padding: 40px; 
            border-radius: 25px; text-align: center; margin-bottom: 30px; 
        }

        .admin-item { 
            background: #f9f9f9; padding: 25px; border-radius: 20px; 
            margin-bottom: 20px; border: 1px solid #eee; position: relative;
        }

        .loc-details { 
            background: #eef2f7; padding: 15px; border-radius: 12px; 
            margin-top: 10px; font-size: 14px; color: #444; border: 1px solid #d1d9e6; line-height: 1.6;
        }

        .del-btn { 
            background: var(--danger); color: white; border: none; 
            padding: 12px 25px; border-radius: 12px; cursor: pointer; 
            font-weight: bold; margin-top: 15px;
        }

        #reg-section, #profile-section { display: none; }
    </style>
</head>
<body>

<button id="install-banner">📥 اضغط هنا لتحميل تطبيق "دليل ديرتك" على شاشة هاتفك</button>

<div class="admin-trigger" onclick="openAdmin()">إدارة</div>

<div class="header">
    <h1>🇮🇶 دليل ديرتك</h1>
    <p>دليلك الشامل للسواق وأصحاب المهن في العراق</p>
</div>

<div class="container">
    <div id="reg-section" class="card">
        <h2 style="text-align:center;">تسجيل هوية جديدة ✨</h2>
        <input type="text" id="reg-name" placeholder="الأسم الكامل">
        <input type="tel" id="reg-phone" placeholder="رقم الموبايل">
        
        <select id="reg-city">
            <option value="">اختر المحافظة</option>
            <option>ميسان</option><option>بغداد</option><option>البصرة</option><option>ذي قار</option>
            <option>بابل</option><option>النجف</option><option>كربلاء</option><option>واسط</option>
            <option>الأنبار</option><option>نينوى</option><option>ديالى</option><option>كركوك</option>
            <option>المثنى</option><option>القادسية</option><option>صلاح الدين</option><option>أربيل</option>
            <option>دهوك</option><option>السليمانية</option>
        </select>

        <select id="reg-type" onchange="toggleFields()">
            <option value="driver">سائق (أبحث عن أسطى)</option>
            <option value="worker">أسطى (صاحب مهنة)</option>
        </select>

        <div id="worker-extra" style="display:none;">
            <input type="text" id="reg-job" placeholder="المهنة (مثلاً: فيتر)">
            <input type="text" id="reg-shop" placeholder="اسم المحل">
            <input type="text" id="reg-area" placeholder="المنطقة / الحي">
        </div>

        <button class="btn btn-main" onclick="register()">حفظ البيانات وتثبيت الموقع GPS 📍</button>
    </div>

    <div id="profile-section" class="card" style="text-align:center;">
        <h2 id="welcome-user">مرحباً بك</h2>
        <p style="color: #666;">بياناتك وموقعك محفوظان في السحابة</p>
        <button class="btn btn-main" onclick="updateGPS()">تحديث موقعي الجغرافي الآن</button>
        <button onclick="logout()" style="color:red; background:none; border:none; margin-top:30px; cursor:pointer; font-weight:bold;">خروج</button>
    </div>

    <h2 style="text-align:center; color: var(--primary); border:none;">🛠️ دليل النشامى المتاحين</h2>
    <div id="display-list"></div>
</div>

<div id="admin-panel">
    <button onclick="closeAdmin()" style="background:#eee; border:none; padding:12px 25px; border-radius:12px; cursor:pointer;">🔙 إغلاق</button>
    <div class="admin-stat">
        <h1 id="total-count" style="margin:0; font-size:60px;">0</h1>
        <p>إجمالي المشتركين في النظام</p>
    </div>
    <div id="admin-list"></div>
</div>

<script>
    // تهيئة Firebase بالبيانات الصحيحة
    const firebaseConfig = {
        apiKey: "AIzaSyDING7DzLK9YwWtdBt1CLJhFPOqRrCBo8s",
        authDomain: "darji-app-13348.firebaseapp.com",
        databaseURL: "https://darji-app-13348-default-rtdb.firebaseio.com",
        projectId: "darji-app-13348",
        storageBucket: "darji-app-13348.firebasestorage.app",
        messagingSenderId: "553323569740",
        appId: "1:553323569740:web:57075700fe68af3d010ae9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // تشغيل زر التحميل (PWA)
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('install-banner').style.display = 'block';
    });

    document.getElementById('install-banner').addEventListener('click', () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choice) => {
                if (choice.outcome === 'accepted') document.getElementById('install-banner').style.display = 'none';
            });
        }
    });

    window.onload = () => {
        const user = localStorage.getItem('satar_system_user');
        if (user) {
            const u = JSON.parse(user);
            document.getElementById('profile-section').style.display = 'block';
            document.getElementById('welcome-user').innerText = "أهلاً " + u.name;
        } else {
            document.getElementById('reg-section').style.display = 'block';
        }
        loadAllData();
    };

    function toggleFields() {
        document.getElementById('worker-extra').style.display = (document.getElementById('reg-type').value === 'worker') ? 'block' : 'none';
    }

    function register() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        if(!name || !phone) return alert("أكمل البيانات");

        navigator.geolocation.getCurrentPosition((pos) => {
            const data = {
                name, phone,
                city: document.getElementById('reg-city').value,
                type: document.getElementById('reg-type').value,
                job: document.getElementById('reg-job').value || "سائق",
                shop: document.getElementById('reg-shop').value || "-",
                area: document.getElementById('reg-area').value || "-",
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                time: new Date().toLocaleString()
            };
            const ref = db.ref('users').push();
            ref.set(data).then(() => {
                data.id = ref.key;
                localStorage.setItem('satar_system_user', JSON.stringify(data));
                location.reload();
            });
        }, () => alert("تنبيه: يجب السماح بالوصول للموقع GPS"));
    }

    let isManager = false;
    function loadAllData() {
        db.ref('users').on('value', (snap) => {
            const list = document.getElementById('display-list');
            const aList = document.getElementById('admin-list');
            list.innerHTML = ''; aList.innerHTML = '';
            let count = 0;

            snap.forEach((child) => {
                const v = child.val(); count++;
                if (v.type === 'worker') {
                    list.innerHTML += `
                        <div class="worker-card">
                            <h3>الأسطى ${v.name} (${v.job})</h3>
                            <div class="stars">⭐⭐⭐⭐⭐</div>
                            <p>📍 ${v.city} - ${v.area} | 🏪 ${v.shop}</p>
                            <a href="tel:${v.phone}" class="btn btn-call">📞 إتصال هاتفي</a>
                            <a href="https://www.google.com/maps?q=${v.lat},${v.lng}" target="_blank" class="btn btn-map btn">📍 عرض الموقع على الخريطة</a>
                        </div>`;
                }
                // بيانات الإدارة التفصيلية (خط الطول والعرض)
                aList.innerHTML += `
                    <div class="admin-item">
                        <b>${v.name}</b> (${v.type === 'worker' ? 'أسطى' : 'سائق'})<br>
                        <span>📞 رقم الهاتف: ${v.phone}</span>
                        <div class="loc-details">
                            <b>إحداثيات الموقع كاملة:</b><br>
                            المدينة: ${v.city} | المنطقة: ${v.area}<br>
                            خط العرض: ${v.lat} | خط الطول: ${v.lng}<br>
                            تاريخ التسجيل: ${v.time}
                        </div>
                        ${isManager ? `<button class="del-btn" onclick="delUser('${child.key}')">حذف الحساب 🗑️</button>` : ''}
                    </div>`;
            });
            document.getElementById('total-count').innerText = count;
        });
    }

    function openAdmin() {
        const p = prompt("رمز الإدارة:");
        if (p === "satar1990") {
            isManager = true;
            document.getElementById('admin-panel').style.display = 'block';
            loadAllData();
        } else { alert("الرمز خطأ!"); }
    }

    function delUser(key) { if(confirm("حذف نهائي؟")) db.ref('users/'+key).remove(); }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    function logout() { localStorage.clear(); location.reload(); }
    function updateGPS() {
        const u = JSON.parse(localStorage.getItem('satar_system_user'));
        navigator.geolocation.getCurrentPosition((p) => {
            db.ref('users/'+u.id).update({ lat: p.coords.latitude, lng: p.coords.longitude });
            alert("تم تحديث موقعك بنجاح!");
        });
    }
</script>
</body>
</html>
