<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل ديرتك - النسخة الاحترافية الكاملة</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #002d5b;
            --gold: #d4af37;
            --success: #28a745;
            --danger: #e74c3c;
            --warning: #ff9800;
            --bg: #f4f7f9;
            --white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 0; 
            color: #333;
            line-height: 1.6;
        }

        /* رأس الصفحة الفخم */
        .header { 
            background: linear-gradient(135deg, var(--primary) 0%, #004a99 100%); 
            color: white; 
            padding: 50px 20px; 
            text-align: center; 
            border-radius: 0 0 40px 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
        }

        .header h1 { margin: 0; font-size: 2.2rem; letter-spacing: 1px; }

        .container { max-width: 550px; margin: auto; padding: 20px; position: relative; top: -20px; }

        /* الكروت والتصميم */
        .card { 
            background: var(--white); 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            margin-bottom: 25px; 
            border: 1px solid rgba(0,0,0,0.03); 
        }

        h2 { color: var(--primary); border-bottom: 3px solid var(--gold); display: inline-block; padding-bottom: 5px; margin-bottom: 25px; font-size: 1.4rem; }

        input, select, textarea { 
            width: 100%; 
            padding: 15px; 
            margin: 12px 0; 
            border: 1.5px solid #eee; 
            border-radius: 15px; 
            font-size: 16px; 
            box-sizing: border-box; 
            transition: 0.3s;
            background: #fafafa;
        }

        input:focus { border-color: var(--primary); outline: none; background: #fff; box-shadow: 0 0 10px rgba(0,45,91,0.1); }

        .btn { 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 15px; 
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer; 
            transition: 0.3s; 
            display: block;
            text-align: center;
            text-decoration: none;
        }

        .btn-reg { background: var(--primary); color: white; box-shadow: 0 5px 15px rgba(0,45,91,0.3); }
        .btn-reg:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,45,91,0.4); }

        /* كرت الأسطى الاحترافي */
        .worker-card { 
            background: var(--white); 
            padding: 25px; 
            margin-bottom: 25px; 
            border-radius: 20px; 
            border-right: 10px solid var(--primary); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); 
            position: relative;
        }

        .stars { color: var(--gold); font-size: 24px; margin: 10px 0; }
        .btn-call { background: var(--success); color: white; margin-top: 15px; }
        .btn-map { background: var(--warning); color: white; margin-top: 10px; }

        .comment-box { 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 15px; 
            margin-top: 20px; 
            border: 1px solid #eee;
            font-size: 14px;
        }

        /* لوحة الإدارة ADM */
        .admin-trigger { 
            position: fixed; 
            bottom: 30px; 
            left: 30px; 
            width: 65px; 
            height: 65px; 
            background: var(--primary); 
            color: white; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            cursor: pointer; 
            z-index: 1000; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.4); 
            border: 3px solid var(--white);
        }

        #admin-panel { 
            display: none; 
            background: var(--white); 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 2000; 
            overflow-y: auto; 
            padding: 40px 20px; 
            box-sizing: border-box; 
        }

        .stat-header { background: var(--primary); color: white; padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
        .delete-btn { background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; }

        #reg-section, #profile-section { display: none; }
    </style>
</head>
<body>

<div class="admin-trigger" onclick="loginAdmin()">إدارة</div>

<div class="header">
    <h1>🇮🇶 دليل ديرتك</h1>
    </div>

<div class="container">
    <div id="reg-section" class="card">
        <h2 style="text-align:center;">تسجيل هوية جديدة ✨</h2>
        <input type="text" id="reg-name" placeholder="الأسم الكامل (مثلاً: أسطى ستار)">
        <input type="tel" id="reg-phone" placeholder="رقم الموبايل">
        
        <select id="reg-city">
            <option value="">اختر المحافظة</option>
            <option>ميسان</option><option>بغداد</option><option>البصرة</option><option>ذي قار</option>
            <option>بابل</option><option>النجف</option><option>كربلاء</option><option>واسط</option>
            <option>الأنبار</option><option>نينوى</option><option>القادسية</option><option>المثنى</option>
            <option>ديالى</option><option>كركوك</option><option>صلاح الدين</option><option>أربيل</option>
            <option>سليمانية</option><option>دهوك</option>
        </select>

        <select id="reg-type" onchange="checkWorkerStatus()">
            <option value="driver">سائق (أبحث عن مصلح)</option>
            <option value="worker">أسطى (صاحب مهنة)</option>
        </select>

        <div id="worker-details" style="display:none;">
            <input type="text" id="reg-job" placeholder="المهنة (مثلاً: فيتر)">
            <input type="text" id="reg-shop" placeholder="اسم المحل">
            <input type="text" id="reg-area" placeholder="المنطقة أو الحي">
        </div>

        <button class="btn btn-reg" onclick="registerProcess()">حفظ وتثبيت الموقع GPS</button>
    </div>

    <div id="profile-section" class="card" style="text-align:center;">
        <h2 id="user-display-name">أهلاً بك</h2>
        <p style="color: #777;">بياناتك وموقعك محفوظان في السحابة</p>
        <button class="btn btn-reg" onclick="refreshUserGPS()">تحديث موقع المحل الآن</button>
        <button onclick="userLogout()" style="background:none; border:none; color:var(--danger); margin-top:30px; cursor:pointer; font-weight:bold; font-size:16px;">تسجيل خروج من الحساب</button>
    </div>

    <h2 style="text-align:center; color: var(--primary); width: 100%;">دليل النشامى المتوفرين</h2>
    <div id="list-container"></div>
</div>

<div id="admin-panel">
    <button onclick="hideAdmin()" style="background:#eee; border:none; padding:12px 25px; border-radius:12px; cursor:pointer; font-weight:bold; margin-bottom:20px;">🔙 إغلاق اللوحة</button>
    <div class="stat-header">
        <h1 id="user-total" style="margin:0; font-size:50px;">0</h1>
        <p>إجمالي المشتركين في التطبيق</p>
    </div>
    <div id="admin-data-rows"></div>
</div>

<script>
    // تهيئة سحابة جوجل Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDING7DzLK9YwWtdBt1CLJhFPOqRrCBo8s",
        authDomain: "darji-app-13348.firebaseapp.com",
        databaseURL: "https://darji-app-13348-default-rtdb.firebaseio.com",
        projectId: "darji-app-13348",
        storageBucket: "darji-app-13348.firebasestorage.app",
        messagingSenderId: "553323569740",
        appId: "1:553323569740:web:57075700fe68af3d010ae9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // كلمات السر للمديرين
    const adminAccess = { "satar1990": "full", "ahmed12345": "mod", "murtada54321": "mod", "ali98765": "mod", "jasim11223": "mod" };
    let hasAdminRights = false;

    window.onload = () => {
        const local = localStorage.getItem('satar_system_user');
        if (local) {
            const u = JSON.parse(local);
            document.getElementById('profile-section').style.display = 'block';
            document.getElementById('user-display-name').innerText = "أهلاً " + u.name;
        } else {
            document.getElementById('reg-section').style.display = 'block';
        }
        startCloudSync();
    };

    function checkWorkerStatus() {
        const isWorker = document.getElementById('reg-type').value === 'worker';
        document.getElementById('worker-details').style.display = isWorker ? 'block' : 'none';
    }

    function registerProcess() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        if(!name || !phone) return alert("أكمل الاسم والهاتف أولاً");

        navigator.geolocation.getCurrentPosition((pos) => {
            const data = {
                name, phone,
                city: document.getElementById('reg-city').value,
                type: document.getElementById('reg-type').value,
                job: document.getElementById('reg-job').value || "سائق",
                shop: document.getElementById('reg-shop').value || "-",
                area: document.getElementById('reg-area').value || "-",
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
            };
            const newEntry = db.ref('users').push();
            newEntry.set(data).then(() => {
                data.id = newEntry.key;
                localStorage.setItem('satar_system_user', JSON.stringify(data));
                location.reload();
            });
        }, () => alert("فشل تحديد الموقع. يرجى تفعيل GPS"));
    }

    function startCloudSync() {
        db.ref('users').on('value', (snap) => {
            const listDiv = document.getElementById('list-container');
            const adminDiv = document.getElementById('admin-data-rows');
            listDiv.innerHTML = ''; adminDiv.innerHTML = '';
            let count = 0;

            snap.forEach((child) => {
                const val = child.val();
                count++;
                if (val.type === 'worker') {
                    listDiv.innerHTML += `
                        <div class="worker-card">
                            <h3 style="margin:0; color:var(--primary);">الأسطى ${val.name} (${val.job})</h3>
                            <div class="stars">⭐⭐⭐⭐⭐ (5/5)</div>
                            <p style="margin:8px 0;">📍 ${val.city} - ${val.area} | 🏪 ${val.shop}</p>
                            <a href="tel:${val.phone}" class="btn btn-call">📞 إتصال بالأسطى</a>
                            <a href="https://www.google.com/maps?q=${val.lat},${val.lng}" target="_blank" class="btn btn-map">📍 موقع المحل على الخريطة</a>
                            <div class="comment-box">
                                <b>آخر تقييم:</b> "شغل احترافي وسريع"
                                <textarea placeholder="أضف تعليقك هنا..." style="height:50px; margin-top:10px;"></textarea>
                                <button class="btn btn-reg" style="padding:10px; font-size:14px; width:120px;">إرسال تقييم</button>
                            </div>
                        </div>`;
                }
                adminDiv.innerHTML += `
                    <div style="padding:20px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                        <span><b>${val.name}</b> (${val.job})<br><small>${val.phone}</small></span>
                        ${hasAdminRights ? `<button class="delete-btn" onclick="removeEntry('${child.key}')">حذف نهائي</button>` : ''}
                    </div>`;
            });
            document.getElementById('user-total').innerText = count;
        });
    }

    function loginAdmin() {
        const secret = prompt("أدخل رمز الإدارة السري:");
        if (adminAccess[secret]) {
            hasAdminRights = true;
            document.getElementById('admin-panel').style.display = 'block';
            startCloudSync();
        } else { alert("الرمز غير صحيح!"); }
    }

    function removeEntry(key) {
        if(confirm("هل تريد حذف هذا المسجل نهائياً؟")) {
            db.ref('users/' + key).remove();
        }
    }

    function hideAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    function userLogout() { localStorage.clear(); location.reload(); }
    
    function refreshUserGPS() {
        const user = JSON.parse(localStorage.getItem('satar_system_user'));
        navigator.geolocation.getCurrentPosition((p) => {
            db.ref('users/' + user.id).update({ lat: p.coords.latitude, lng: p.coords.longitude });
            alert("تم تحديث موقعك في سحابة جوجل بنجاح!");
        });
    }
</script>
</body>
</html>
