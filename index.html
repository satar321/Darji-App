<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دارجي - دليل ميكانيكيي العراق</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #008080; }
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        button { background-color: #008080; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #006666; }
        .whatsapp-btn { background-color: #25D366; }
    </style>
</head>
<body>
    <div class="container">
        <h1>تطبيق دارجي</h1>
        <p>سجل بياناتك للانضمام إلى أكبر شبكة في العراق</p>
        
        <input type="text" id="name" placeholder="الاسم الكامل">
        
        <select id="userType">
            <option value="">اختر الفئة...</option>
            <option value="أسطى">أسطى (ميكانيكي)</option>
            <option value="سائق">سائق</option>
        </select>
        
        <select id="governorate">
            <option value="">اختر المحافظة...</option>
            <option>بغداد</option><option>ميسان</option><option>البصرة</option><option>ذي قار</option>
            <option>النجف</option><option>كربلاء</option><option>بابل</option><option>القادسية</option>
            <option>المثنى</option><option>واسط</option><option>ديالى</option><option>الأنبار</option>
            <option>نينوى</option><option>صلاح الدين</option><option>كركوك</option><option>أربيل</option>
            <option>السليمانية</option><option>دهوك</option>
        </select>

        <input type="text" id="phone" placeholder="رقم الهاتف">
        
        <button class="whatsapp-btn" onclick="verifyWhatsApp()">تفعيل الحساب عبر واتساب</button>
    </div>

    <script>
        function verifyWhatsApp() {
            const name = document.getElementById('name').value;
            const type = document.getElementById('userType').value;
            const gov = document.getElementById('governorate').value;
            const phone = document.getElementById('phone').value;
            
            if(!name || !type || !gov || !phone) {
                alert("يرجى ملء جميع البيانات");
                return;
            }

            const message = `مرحباً، أنا ${name}. أرغب بتفعيل حسابي في تطبيق دارجي كـ (${type}) في محافظة (${gov}). رقم هاتفي: ${phone}`;
            const whatsappUrl = `https://wa.me/9647700000000?text=${encodeURIComponent(message)}`;
            
            window.open(whatsappUrl, '_blank');
            alert("تم إرسال بياناتك. سيتم تفعيل حسابك تلقائياً الآن!");
        }
    </script>
</body>
</html>
