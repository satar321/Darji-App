<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل ديرتك - الإصدار الاحترافي الكامل</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'دليل ديرتك','short_name':'ديرتك','start_url':'.','display':'standalone','background_color':'#002d5b','theme_color':'#002d5b','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/1042/1042390.png','sizes':'512x512','type':'image/png'}]}">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#002d5b">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #002d5b;
            --gold: #d4af37;
            --success: #28a745;
            --danger: #e74c3c;
            --warning: #ff9800;
            --bg: #f8f9fb;
            --white: #ffffff;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-lg: 0 15px 35px rgba(0,0,0,0.15);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            margin: 0; padding: 0; color: #333; 
            -webkit-tap-highlight-color: transparent;
        }

        /* تصميم زر تحميل البرنامج العلوي */
        #install-banner { 
            display: none; 
            background: linear-gradient(90deg, var(--gold), #f1c40f); 
            color: var(--primary); 
            text-align: center; 
            padding: 18px; 
            font-weight: 800; 
            cursor: pointer; 
            border: none; 
            width: 100%; 
            font-size: 17px; 
            position: sticky; 
            top: 0; 
            z-index: 9999; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .header { 
            background: linear-gradient(135deg, var(--primary) 0%, #004a99 100%); 
            color: white; 
            padding: 65px 20px; 
            text-align: center; 
            border-bottom-left-radius: 50px; 
            border-bottom-right-radius: 50px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
        }

        .header h1 { margin: 0; font-size: 2.4rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { opacity: 0.85; margin-top: 12px; font-size: 1.1rem; }

        .container { max-width: 550px; margin: -35px auto 0; padding: 20px; position: relative; }

        .card { 
            background: var(--white); 
            padding: 35px; 
            border-radius: 28px; 
            box-shadow: var(--shadow-sm); 
            margin-bottom: 30px; 
            border: 1px solid rgba(0,0,0,0.02);
            transition: transform 0.3s ease;
        }

        h2 { color: var(--primary); border-right: 6px solid var(--gold); padding-right: 15px; margin-bottom: 30px; }

        input, select, textarea { 
            width: 100%; padding: 18px; margin: 14px 0; border: 2px solid #edf2f7; 
            border-radius: 18px; font-size: 16px; box-sizing: border-box; 
            background: #fdfdfd; transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--primary); outline: none; background: #fff; box-shadow: 0 0 15px rgba(0,45,91,0.08); }

        .btn { 
            width: 100%; padding: 20px; border: none; border-radius: 18px; 
            font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; 
            display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none;
        }

        .btn-reg { background: var(--primary); color: white; box-shadow: 0 8px 20px rgba(0,45,91,0.25); }
        .btn-reg:active { transform: scale(0.98); }

        /* تنسيق كرت الأسطى الاحترافي */
        .worker-card { 
            background: var(--white); padding: 30px; margin-bottom: 30px; 
            border-radius: 25px; border-right: 12px solid var(--primary); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.06); position: relative;
        }

        .stars { color: var(--gold); font-size: 26px; margin: 12px 0; letter-spacing: 2px; }
        .btn-call { background: var(--success); color: white; margin-top: 20px; }
        .btn-map { background: var(--warning); color: white; margin-top: 12px; font-size: 15px; }

        /* زر الإدارة العائم */
        .admin-trigger { 
            position: fixed; bottom: 35px; left: 35px; width: 70px; height: 70px; 
            background: var(--primary); color: white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; cursor: pointer; z-index: 1000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 4px solid white;
        }

        /* لوحة الإدارة الشاملة */
        #admin-panel { 
            display: none; background: var(--white); position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; z-index: 99999; overflow-y: auto; 
            padding: 45px 25px; box-sizing: border-box; 
        }

        .admin-header-card { 
            background: var(--primary); color: white; padding: 40px; 
            border-radius: 30px; text-align: center; margin-bottom: 40px; 
            box-shadow: var(--shadow-lg);
        }

        .admin-item { 
            background: #f8fafc; padding: 25px; border-radius: 20px; 
            margin-bottom: 20px; border: 1.5px solid #edf2f7; position: relative;
        }

        .admin-loc-box { 
            background: #eef2f7; padding: 15px; border-radius: 12px; 
            margin-top: 15px; font-size: 14px; color: #444; border: 1px solid #d1d9e6; line-height: 1.6;
        }

        .delete-btn { 
            background: var(--danger); color: white; border: none; 
            padding: 12px 25px; border-radius: 12px; cursor: pointer; 
            font-weight: bold; margin-top: 15px; transition: 0.2s;
        }

        #reg-section, #profile-section { display: none; }
    </style>
</head>
<body>

<button id="install-banner">📥 اضغط هنا لتحميل تطبيق "دليل ديرتك" على هاتفك</button>

<div class="admin-trigger" onclick="openManager()">إدارة</div>

<div class="header">
    <h1>🇮🇶 دليل ديرتك</h1>
    <p>دليلك الشامل للسواق وأصحاب المهن في العراق</p>
</div>

<div class="container">
    <div id="reg-section" class="card">
        <h2 style="text-align:center;">تسجيل هوية جديدة ✨</h2>
        <input type="text" id="in-name" placeholder="الأسم الكامل (مثلاً: أسطى ستار)">
        <input type="tel" id="in-phone" placeholder="رقم الموبايل">
        
        <select id="in-city">
            <option value="">اختر المحافظة</option>
            <option>ميسان</option><option>بغداد</option><option>البصرة</option><option>ذي قار</option>
            <option>بابل</option><option>النجف</option><option>كربلاء</option><option>واسط</option>
            <option>الأنبار</option><option>نينوى</option><option>ديالى</option><option>كركوك</option>
            <option>المثنى</option><option>القادسية</option><option>صلاح الدين</option><option>أربيل</option>
            <option>دهوك</option><option>السليمانية</option>
        </select>

        <select id="in-type" onchange="checkUserType()">
            <option value="driver">سائق (أبحث عن أسطى)</option>
            <option value="worker">أسطى (صاحب مهنة)</option>
        </select>

        <div id="worker-extra" style="display:none;">
            <input type="text" id="in-job" placeholder="المهنة (مثلاً: فيتر سيارات)">
            <input type="text" id="in-shop" placeholder="اسم المحل أو الورشة">
            <input type="text" id="in-area" placeholder="المنطقة أو الحي السكني">
        </div>

        <button class="btn btn-reg" onclick="handleRegistration()">
            <span>حفظ البيانات وتثبيت الموقع GPS</span> 📍
        </button>
    </div>

    <div id="profile-section" class="card" style="text-align:center;">
        <h2 id="user-display-name">مرحباً بك</h2>
        <p style="color: #777; margin-bottom: 30px;">حسابك موثق وإحداثيات موقعك محفوظة بدقة</p>
        <button class="btn btn-reg" onclick="refreshUserLocation()">تحديث موقع المحل الآن</button>
        <button onclick="systemLogout()" style="background:none; border:none; color:var(--danger); margin-top:40px; cursor:pointer; font-weight:bold;">تسجيل الخروج</button>
    </div>

    <h2 style="text-align:center; color: var(--primary); border:none;">🛠️ دليل النشامى المتاحين</h2>
    <div id="public-display-list"></div>
</div>

<div id="admin-panel">
    <button onclick="closeManager()" style="background:#f1f5f9; border:none; padding:15px 30px; border-radius:15px; cursor:pointer; font-weight:bold;">🔙 العودة</button>
    <div class="admin-header-card">
        <h1 id="stat-total" style="margin:0; font-size:65px;">0</h1>
        <p>إجمالي عدد المشتركين في النظام</p>
    </div>
    <div id="admin-data-view"></div>
</div>

<script>
    // تهيئة Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDING7DzLK9YwWtdBt1CLJhFPOqRrCBo8s",
        authDomain: "darji-app-13348.firebaseapp.com",
        databaseURL: "https://darji-app-13348-default-rtdb.firebaseio.com",
        projectId: "darji-app-13348",
        storageBucket: "darji-app-13348.firebasestorage.app",
        messagingSenderId: "553323569740",
        appId: "1:553323569740:web:57075700fe68af3d010ae9"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // برمجة زر التحميل (PWA)
    let promptEvent;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); promptEvent = e;
        document.getElementById('install-banner').style.display = 'block';
    });

    document.getElementById('install-banner').addEventListener('click', () => {
        if (promptEvent) {
            promptEvent.prompt();
            promptEvent.userChoice.then((result) => {
                if (result.outcome === 'accepted') document.getElementById('install-banner').style.display = 'none';
            });
        }
    });

    // إدارة الدخول والبيانات
    let isManagerMode = false;

    window.onload = () => {
        const local = localStorage.getItem('satar_final_user');
        if (local) {
            const parsed = JSON.parse(local);
            document.getElementById('profile-section').style.display = 'block';
            document.getElementById('user-display-name').innerText = "أهلاً " + parsed.name;
        } else {
            document.getElementById('reg-section').style.display = 'block';
        }
        startCloudSync();
    };

    function checkUserType() {
        const type = document.getElementById('in-type').value;
        document.getElementById('worker-extra').style.display = (type === 'worker') ? 'block' : 'none';
    }

    function handleRegistration() {
        const name = document.getElementById('in-name').value;
        const phone = document.getElementById('in-phone').value;
        if(!name || !phone) return alert("يرجى إكمال الاسم ورقم الهاتف");

        navigator.geolocation.getCurrentPosition((p) => {
            const userObj = {
                name, phone,
                city: document.getElementById('in-city').value,
                type: document.getElementById('in-type').value,
                job: document.getElementById('in-job').value || "سائق",
                shop: document.getElementById('in-shop').value || "-",
                area: document.getElementById('in-area').value || "-",
                lat: p.coords.latitude,
                lng: p.coords.longitude,
                regTime: new Date().toLocaleString()
            };
            const newRef = database.ref('users').push();
            newRef.set(userObj).then(() => {
                userObj.id = newRef.key;
                localStorage.setItem('satar_final_user', JSON.stringify(userObj));
                location.reload();
            });
        }, () => alert("تنبيه: يجب السماح بالوصول للموقع GPS لإكمال التسجيل"));
    }

    function startCloudSync() {
        database.ref('users').on('value', (snapshot) => {
            const pub = document.getElementById('public-display-list');
            const adm = document.getElementById('admin-data-view');
            pub.innerHTML = ''; adm.innerHTML = '';
            let totalCount = 0;

            snapshot.forEach((child) => {
                const item = child.val();
                totalCount++;
                if (item.type === 'worker') {
                    pub.innerHTML += `
                        <div class="worker-card">
                            <h3 style="margin:0; font-size:1.4rem;">الأسطى ${item.name} (${item.job})</h3>
                            <div class="stars">⭐⭐⭐⭐⭐</div>
                            <p>📍 ${item.city} - ${item.area} | 🏪 ${item.shop}</p>
                            <a href="tel:${item.phone}" class="btn btn-call">📞 إتصال بالأسطى</a>
                            <a href="https://www.google.com/maps?q=${item.lat},${item.lng}" target="_blank" class="btn btn-map btn">📍 موقع المحل على الخريطة</a>
                        </div>`;
                }
                // بيانات الإدارة التفصيلية (كود مكثف للعرض)
                adm.innerHTML += `
                    <div class="admin-item">
                        <b style="font-size:18px;">${item.name}</b> (${item.type === 'worker' ? 'أسطى' : 'سائق'})<br>
                        <span>رقم الهاتف: ${item.phone}</span>
                        <div class="admin-loc-box">
                            <b>تفاصيل الموقع والإحداثيات:</b><br>
                            المحافظة: ${item.city} | المنطقة: ${item.area}<br>
                            خط العرض: ${item.lat} | خط الطول: ${item.lng}<br>
                            توقيت الانضمام: ${item.regTime}
                        </div>
                        ${isManagerMode ? `<button class="delete-btn" onclick="deleteUserRecord('${child.key}')">حذف الحساب نهائياً 🗑️</button>` : ''}
                    </div>`;
            });
            document.getElementById('stat-total').innerText = totalCount;
        });
    }

    function openManager() {
        const pass = prompt("رمز الإدارة السري:");
        if (pass === "satar1990") {
            isManagerMode = true;
            document.getElementById('admin-panel').style.display = 'block';
            startCloudSync();
        } else { alert("الرمز غير صحيح!"); }
    }

    function deleteUserRecord(key) {
        if(confirm("هل أنت متأكد من حذف هذا المشترك؟")) {
            database.ref('users/' + key).remove();
        }
    }

    function closeManager() { document.getElementById('admin-panel').style.display = 'none'; }
    function systemLogout() { if(confirm("خروج؟")) { localStorage.clear(); location.reload(); } }
    
    function refreshUserLocation() {
        const u = JSON.parse(localStorage.getItem('satar_final_user'));
        navigator.geolocation.getCurrentPosition((p) => {
            database.ref('users/' + u.id).update({
                lat: p.coords.latitude,
                lng: p.coords.longitude
            }).then(() => alert("نجاح: تم تحديث موقعك الجغرافي"));
        });
    }
</script>
</body>
</html>
