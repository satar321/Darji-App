<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دارجي - تسجيل الدخول</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; padding: 0; background: #002147; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: white; padding: 25px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { width: 100px; margin-bottom: 15px; border-radius: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .btn-entry { background: #b89344; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .admin-link { display: block; margin-top: 25px; color: #bbb; text-decoration: none; font-size: 11px; }
        .hidden { display: none; }
        .gps-box { background: #f0f4f8; padding: 10px; border-radius: 10px; margin: 10px 0; border: 1px dashed #b89344; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo.png" alt="دارجي" class="logo">
    <h2 style="color: #002147; margin-bottom: 10px;">دخول النظام</h2>

    <input type="text" id="userName" placeholder="الاسم الكامل">
    <input type="tel" id="userPhone" placeholder="رقم الهاتف">
    
    <select id="userProvince">
        <option value="">اختر المحافظة...</option>
        <option>ميسان</option><option>بغداد</option><option>البصرة</option><option>ذي قار</option>
        <option>النجف</option><option>كربلاء</option><option>بابل</option><option>الأنبار</option>
        <option>نينوى</option><option>القادسية</option><option>المثنى</option><option>واسط</option>
    </select>

    <select id="userRole" onchange="toggleMechanicFields()">
        <option value="driver">أنا سائق (أبحث عن مساعدة)</option>
        <option value="mechanic">أنا أسطى (صاحب مهنة)</option>
    </select>

    <div id="mechanicFields" class="hidden">
        <input type="text" id="shopName" placeholder="اسم المحل (مثلاً: محلات الأخوين)">
        <select id="specialty">
            <option value="فيتر">فيتر</option>
            <option value="بنجرجي">بنجرجي</option>
            <option value="مواد احتياطية">مواد احتياطية</option>
            <option value="كهربائي">كهربائي</option>
        </select>
        <div class="gps-box">
            <p id="gpsStatus" style="color: #e74c3c; font-size: 12px; margin: 0;">📍 يرجى الوقوف في المحل لتثبيت الموقع</p>
        </div>
    </div>

    <button class="btn-entry" onclick="processLogin()">دخول النظام</button>
    <a href="admin.html" class="admin-link">⚙️ لوحة تحكم المشرفين</a>
</div>

<script>
    let lat, lng;
    
    // جلب الموقع تلقائياً بمجرد فتح الصفحة
    navigator.geolocation.getCurrentPosition(p => {
        lat = p.coords.latitude; 
        lng = p.coords.longitude;
        const status = document.getElementById('gpsStatus');
        if(status) {
            status.innerText = "✅ تم التقاط موقع المحل بنجاح";
            status.style.color = "green";
        }
    }, null, {enableHighAccuracy: true});

    function toggleMechanicFields() {
        const isMech = document.getElementById('userRole').value === 'mechanic';
        document.getElementById('mechanicFields').classList.toggle('hidden', !isMech);
    }

    function processLogin() {
        const name = document.getElementById('userName').value;
        const province = document.getElementById('userProvince').value;
        const role = document.getElementById('userRole').value;

        if(!name || !province) { alert("أكمل بياناتك أولاً"); return; }
        if(role === 'mechanic' && !lat) { alert("انتظر قليلاً لتثبيت موقع المحل عبر GPS"); return; }

        const userData = {
            name: name,
            phone: document.getElementById('userPhone').value,
            province: province,
            role: role,
            shop: document.getElementById('shopName').value || "محل شخصي",
            spec: document.getElementById('specialty').value,
            lat: lat, 
            lng: lng
        };

        let users = JSON.parse(localStorage.getItem('users') || "[]");
        users.push(userData);
        localStorage.setItem('users', JSON.stringify(users));
        
        window.location.href = "main_app.html";
    }
</script>
</body>
</html>
