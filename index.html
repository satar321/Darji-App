<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دارجي - دخول النظام</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            margin: 0; padding: 0;
            background: #002147; /* الخلفية الزرقاء الداكنة */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .login-card {
            background: white; padding: 30px; border-radius: 25px;
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .logo { width: 100px; margin-bottom: 20px; }
        input, select {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 1px solid #ddd; border-radius: 10px; background: #f9f9f9;
            font-size: 16px;
        }
        .btn-entry {
            background: #b89344; /* اللون الذهبي للأزرار */
            color: white; border: none;
            padding: 15px; width: 100%; border-radius: 10px; 
            font-size: 18px; cursor: pointer; font-weight: bold;
        }
        .admin-section {
            margin-top: 25px; padding-top: 15px;
            border-top: 1px solid #eee;
        }
        .admin-btn {
            display: inline-block; color: #002147; 
            text-decoration: none; font-weight: bold; font-size: 14px;
        }
        .install-prompt {
            display: none; background: #e8f5e9; color: #2e7d32;
            padding: 10px; border-radius: 10px; margin-top: 15px;
            font-size: 13px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo.png" alt="دارجي" class="logo">
    <h2 style="color: #002147; margin-bottom: 20px;">مرحباً بك في دارجي</h2>
    
    <input type="text" placeholder="الاسم الكامل">
    <input type="text" placeholder="رقم الهاتف (الواتساب)">
    
    <select>
        <option>أنا سائق</option>
        <option>أنا صاحب ورشة</option>
    </select>

    <button class="btn-entry">دخول النظام</button>
    
    <div id="installBtn" class="install-prompt">
        📥 اضغط هنا لتحميل التطبيق على هاتفك
    </div>

    <div class="admin-section">
        <a href="admin.html" class="admin-btn">⚙️ لوحة تحكم الإدارة (الأدمن)</a>
    </div>
</div>

<script>
    // كود خاصية التحميل PWA
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            installBtn.style.display = 'none';
        }
    });
</script>

</body>
</html>
