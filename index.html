<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دارجي - الدخول</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; padding: 0; background: #002147; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .login-card { background: white; padding: 25px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { width: 80px; margin-bottom: 15px; }
        .install-banner { background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; cursor: pointer; display: none; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .hidden { display: none; }
        .btn-entry { background: #b89344; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .admin-link { display: block; margin-top: 20px; color: #999; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

<div class="login-card">
    <div id="installBtn" class="install-banner">📥 اضغط هنا لتحميل التطبيق على هاتفك</div>
    <img src="logo.png" alt="دارجي" class="logo">
    <h2 style="color: #002147;">مرحباً بك في دارجي</h2>

    <input type="text" id="userName" placeholder="الاسم الكامل">
    <input type="tel" id="userPhone" placeholder="رقم الهاتف (واتساب)">
    
    <select id="userProvince">
        <option value="">اختر المحافظة...</option>
        <option>ميسان</option>
        <option>بغداد</option>
        <option>البصرة</option>
        <option>ذي قار</option>
    </select>

    <select id="userRole" onchange="toggleSpecialty()">
        <option value="driver">أنا سائق</option>
        <option value="mechanic">أنا ميكانيكي (أسطى)</option>
    </select>

    <div id="mechanicOptions" class="hidden">
        <select id="specialty">
            <option>فيتر</option>
            <option>بنجرجي</option>
            <option>مواد احتياطية</option>
            <option>محل زيوت</option>
            <option>غسل سيارات</option>
        </select>
    </div>

    <p id="gpsStatus" style="font-size: 12px; color: red;">⚠️ يرجى تفعيل الموقع (GPS) للدخول</p>
    <button class="btn-entry" id="loginBtn" onclick="processLogin()">دخول النظام</button>
    
    <a href="admin.html" class="admin-link">إدارة النظام</a>
</div>

<script>
    let userCoords = null;

    // تفعيل الـ GPS
    navigator.geolocation.getCurrentPosition((pos) => {
        userCoords = pos.coords;
        document.getElementById('gpsStatus').innerText = "✅ الموقع مفعل";
        document.getElementById('gpsStatus').style.color = "green";
    }, (err) => { alert("لا يمكن الدخول بدون تشغيل GPS"); });

    function toggleSpecialty() {
        const role = document.getElementById('userRole').value;
        document.getElementById('mechanicOptions').classList.toggle('hidden', role !== 'mechanic');
    }

    function processLogin() {
        if(!userCoords) { alert("فعل الموقع أولاً"); return; }
        const name = document.getElementById('userName').value;
        const province = document.getElementById('userProvince').value;
        if(!name || !province) { alert("أكمل البيانات"); return; }
        
        // هنا يتم الربط مع Google Sheets لاحقاً
        window.location.href = "main_app.html";
    }

    // كود التحميل
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });
    document.getElementById('installBtn').onclick = () => {
        deferredPrompt.prompt();
    };
</script>
</body>
</html>
