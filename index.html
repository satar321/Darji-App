<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق دارجي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #001f3f url('logo.png') no-repeat center center fixed; 
            background-size: contain; 
            font-family: 'Cairo', sans-serif; margin: 0; color: white;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .overlay { background: rgba(0, 31, 63, 0.94); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .card { background: white; color: #333; padding: 20px; border-radius: 25px; width: 90%; max-width: 380px; text-align: center; margin-top: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { width: 90px; border-radius: 15px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; font-family: 'Cairo'; text-align: center; box-sizing: border-box; font-size: 16px; }
        .btn-main { background: #b89c44; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* واجهة الأسطى الجديدة */
        .dash-item { background: #f8f9fa; border-radius: 15px; padding: 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; border-right: 5px solid #b89c44; }
        .status-on { color: #2e7d32; font-weight: bold; }
        .logout-text { color: #cc0000; font-size: 13px; cursor: pointer; margin-top: 15px; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <div class="card" id="mainCard">
        <img src="logo.png" class="logo">
        <h2 style="margin:0; color:#001f3f;">تطبيق دارجي</h2>
        <p style="font-size:14px; color:#666;">سجل بياناتك للبدء بالعمل</p>
        
        <input type="text" id="uName" placeholder="الاسم الكامل">
        <input type="tel" id="uPhone" placeholder="رقم الهاتف">
        
        <select id="uType" onchange="document.getElementById('uJob').style.display = (this.value === 'أسطى') ? 'block' : 'none';">
            <option value="سائق">أنا سائق (صاحب سيارة)</option>
            <option value="أسطى">أنا أسطى (ميكانيكي/فني)</option>
        </select>

        <select id="uJob" style="display:none; border: 2px solid #b89c44;">
            <option value="">اختر تخصصك...</option>
            <option value="فيتر">فيتر (ميكانيكي)</option>
            <option value="بنجرجي">بنجرجي</option>
            <option value="حداد سيارات">حداد سيارات</option>
            <option value="تغيير زيوت">تغيير زيوت</option>
        </select>

        <div id="gpsBtn" style="background:#eee; padding:10px; margin:10px 0; border-radius:10px; cursor:pointer;" onclick="getLoc()">📍 تفعيل الموقع (GPS)</div>
        <button class="btn-main" onclick="openApp()">دخول التطبيق</button>
    </div>

    <script>
        var coords = "";
        function getLoc() {
            navigator.geolocation.getCurrentPosition(function(p) {
                coords = p.coords.latitude + "," + p.coords.longitude;
                document.getElementById('gpsBtn').style.background = "#e8f5e9";
                document.getElementById('gpsBtn').innerText = "تم تحديد موقعك ✅";
            }, function() { alert("يرجى تفعيل GPS"); });
        }

        function openApp() {
            var name = document.getElementById('uName').value;
            var phone = document.getElementById('uPhone').value;
            var job = document.getElementById('uJob').value || "سائق";
            
            if(!name || !phone || !coords) return alert("يرجى إكمال البيانات أولاً");

            // عرض واجهة الأسطى الاحترافية
            document.getElementById('mainCard').innerHTML = `
                <div style="text-align:right;">
                    <img src="logo.png" style="width:50px; float:left; border-radius:8px;">
                    <h3 style="margin:0; color:#001f3f;">لوحة التحكم</h3>
                    <p style="font-size:12px; color:#666;">أهلاً بك، أسطى ${name}</p>
                </div>
                <hr style="border:0; border-top:1px solid #eee;">
                
                <div class="dash-item">
                    <span>حالة العمل:</span>
                    <span class="status-on">متصل الآن ✅</span>
                </div>
                
                <div class="dash-item">
                    <span>التخصص:</span>
                    <b>${job}</b>
                </div>

                <div class="dash-item">
                    <span>الطلبات المستلمة:</span>
                    <b style="background:#b89c44; color:white; padding:2px 10px; border-radius:20px;">0</b>
                </div>

                <button class="btn-main" onclick="alert('جاري البحث عن زبائن في منطقتك...')">تحديث الموقع</button>
                <div class="logout-text" onclick="location.reload()">تسجيل خروج من النظام</div>
            `;
        }
    </script>
</body>
</html>
