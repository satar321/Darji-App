<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دارجي - تسجيل الدخول</title>
    <meta name="description" content="تطبيق دارجي - دليل أسطوات ميسان والعراق">
    <meta name="keywords" content="دارجي, فيتر, كهربائي, أسطى, ميسان, تصليح سيارات">
    <meta name="author" content="ستار">
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; background: #002147; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .login-card { background: white; padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .logo { width: 120px; margin-bottom: 20px; border-radius: 20px; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #b89344; }
        .btn-entry { background: #b89344; color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-entry:active { transform: scale(0.98); }
        .hidden { display: none; }
        .admin-section { margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; }
        .admin-link { color: #888; text-decoration: none; font-size: 13px; font-weight: bold; transition: 0.3s; }
        .admin-link:hover { color: #b89344; }
        #gpsStatus { font-size: 12px; margin: 5px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo.png" alt="دارجي" class="logo">
    <h2 style="color: #002147; margin: 0 0 20px 0;">تسجيل الدخول</h2>

    <input type="text" id="userName" placeholder="الاسم الكامل (مطلوب)">
    <input type="tel" id="userPhone" placeholder="رقم الهاتف (مطلوب)">
    
    <select id="userProvince">
        <option value="">اختر المحافظة (مطلوب)...</option>
        <option>ميسان</option><option>بغداد</option><option>البصرة</option>
        <option>ذي قار</option><option>النجف</option><option>كربلاء</option>
        <option>بابل</option><option>الأنبار</option><option>نينوى</option>
        <option>واسط</option><option>صلاح الدين</option><option>ديالى</option>
    </select>

    <select id="userRole" onchange="toggleMech()">
        <option value="">حدد نوع الحساب (مطلوب)...</option>
        <option value="driver">أنا سائق</option>
        <option value="mechanic">أنا أسطى</option>
    </select>

    <div id="mechFields" class="hidden">
        <input type="text" id="shopName" placeholder="اسم المحل (مثل: محلات ستار)">
        <input type="text" id="shopAddress" placeholder="عنوان المحل (مثل: حي الحسين)">
        <select id="specialty">
            <option>فيتر</option><option>بنجرجي</option>
            <option>كهربائي</option><option>مواد احتياطية</option>
        </select>
        <p id="gpsStatus" style="color:red;">📍 بانتظار GPS لتحديد موقعك...</p>
    </div>

    <button class="btn-entry" onclick="processLogin()">دخول النظام</button>

    <div class="admin-section">
        <a href="admin.html" class="admin-link">⚙️ لوحة تحكم المشرفين</a>
    </div>
</div>

<script>
    // المتغيرات الأساسية
    let userLat = 0;
    let userLng = 0;
    let installer;

    // --- كود تفعيل زر تثبيت التطبيق ---
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        installer = e;
    });

    function checkInstall() {
        if (installer) {
            installer.prompt();
        } else {
            alert("التطبيق جاهز للتثبيت! يمكنك أيضاً الضغط على (الثلاث نقاط) في المتصفح واختيار 'تثبيت التطبيق'.");
        }
    }
    // --------------------------------

    // تشغيل الـ GPS
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(p => {
            userLat = p.coords.latitude;
            userLng = p.coords.longitude;
            const status = document.getElementById('gpsStatus');
            if(status) {
                status.innerText = "✅ تم تحديد موقع المحل بنجاح";
                status.style.color = "green";
            }
        }, err => {
            console.log("GPS Error: ", err);
        }, {enableHighAccuracy: true});
    }

    function toggleMech() {
        const role = document.getElementById('userRole').value;
        const fields = document.getElementById('mechFields');
        if(role === 'mechanic') {
            fields.classList.remove('hidden');
        } else {
            fields.classList.add('hidden');
        }
    }

    function processLogin() {
        const name = document.getElementById('userName').value.trim();
        const role = document.getElementById('userRole').value;

        if (!name || !role) {
            alert("يا ستار، يرجى ملء الحقول المطلوبة!");
            return;
        }

        const userData = {
            name: name,
            phone: document.getElementById('userPhone').value,
            role: role,
            lat: userLat,
            lng: userLng
        };

        localStorage.setItem('currentUser', JSON.stringify(userData));
        window.location.href = "main_app.html";
    }
</script>

</body>
</html>
