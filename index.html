<script>
    let userCoords = null;

    window.onload = function() {
        if ("geolocation" in navigator) {
            // إضافة خاصية الدقة العالية لضمان جلب الموقع بسرعة
            navigator.geolocation.getCurrentPosition(function(pos) {
                userCoords = pos.coords;
                document.getElementById('gpsStatus').innerText = "✅ تم حفظ موقعك بدقة";
                document.getElementById('gpsStatus').style.color = "#2ecc71";
            }, function(err) {
                alert("يرجى السماح بالوصول للموقع لتشغيل الخرائط");
            }, { enableHighAccuracy: true });
        }
    };

    function saveAndGo() {
        const name = document.getElementById('userName').value;
        const province = document.getElementById('userProvince').value;
        
        // التحقق من وجود الموقع قبل الانتقال
        if(!userCoords) {
            alert("انتظر قليلاً حتى يتم تحديد موقعك (GPS)");
            return;
        }

        const data = {
            name: name,
            phone: document.getElementById('userPhone').value,
            province: province,
            role: document.getElementById('userRole').value,
            specialty: document.getElementById('specialty').value || "سائق",
            lat: userCoords.latitude, // حفظ خط العرض
            lng: userCoords.longitude // حفظ خط الطول
        };

        let allUsers = JSON.parse(localStorage.getItem('allUsers') || "[]");
        allUsers.push(data);
        localStorage.setItem('allUsers', JSON.stringify(allUsers));
        
        window.location.href = "main_app.html";
    }
</script>
