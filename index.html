<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق دارجي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            /* هنا نضع صورتك كخلفية ثابتة واحترافية */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://satar321.github.io/Darji-App/1000165895.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.92); /* شفافية بسيطة لتعطي جمالية */
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 85%;
            max-width: 400px;
            text-align: center;
            border-top: 5px solid #25D366;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
        }
        button {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #075E54;">تطبيق دارجي</h2>
        <p style="color: #666; margin-bottom: 20px;">أهلاً بك في منصة المحترفين</p>
        <input type="text" id="name" placeholder="اكتب اسمك الكامل">
        <select id="type">
            <option value="سائق">أنا سائق</option>
            <option value="أسطى">أنا أسطى (ميكانيكي)</option>
        </select>
        <select id="city">
            <option value="ميسان">ميسان</option>
            <option value="بغداد">بغداد</option>
            <option value="البصرة">البصرة</option>
            <option value="النجف">النجف</option>
            <option value="كربلاء">كربلاء</option>
            </select>
        <button onclick="sendData()">تفعيل عبر واتساب</button>
    </div>

    <script>
        function sendData() {
            const n = document.getElementById('name').value;
            const t = document.getElementById('type').value;
            const c = document.getElementById('city').value;
            const msg = `مشروع دارجي - طلب جديد:%0Aالاسم: ${n}%0Aالفئة: ${t}%0Aالمحافظة: ${c}`;
            window.open(`https://wa.me/9647709094462?text=${msg}`);
        }
    </script>
</body>
</html>
