<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق دارجي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* شاشة التحميل (Splash Screen) */
        #splash {
            position: fixed; width: 100%; height: 100%;
            background-color: #002244; /* لون أزرق غامق مناسب للشعار */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        #splash img { width: 150px; border-radius: 20px; animation: pulse 2s infinite; }
        #splash p { color: white; margin-top: 20px; font-family: 'Cairo'; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.1);} 100% {transform: scale(1);} }

        body {
            background-color: #f0f4f8; font-family: 'Cairo', sans-serif;
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            background: white; padding: 25px; border-radius: 25px;
            width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 2px solid #b89c44; /* لون ذهبي مناسب للشعار */
        }
        input, select {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid #ddd; font-family: 'Cairo'; box-sizing: border-box;
        }
        button {
            background-color: #b89c44; /* لون ذهبي للأزرار */
            color: white; border: none; padding: 15px; border-radius: 12px;
            font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px;
        }
    </style>
</head>
<body>

<div id="splash">
    <img src="darji-logo.png" alt="شعار دارجي">
    <p>جاري تحميل دارجي العراقي...</p>
</div>

<div class="container">
    <img src="darji-logo.png" style="width: 120px; border-radius: 15px; margin-bottom: 10px;">
    
    <h2 style="color: #002244; margin: 10px 0;">تطبيق دارجي العراقي</h2>
    <p style="color: #666; font-size: 14px; margin-bottom: 20px;">دليلك الأول للميكانيك</p>
    
    <input type="text" id="name" placeholder="الاسم الكامل">
    <select id="type">
        <option value="أسطى">أنا أسطى</option>
        <option value="سائق">أنا سائق سيارة</option>
    </select>
    <select id="city">
        <option>ميسان</option><option>بغداد</option><option>البصرة</option><option>ذي قار</option>
    </select>

    <button onclick="send()">تفعيل عبر واتساب</button>
</div>

<script>
    // إخفاء شاشة التحميل بعد 3 ثواني
    setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 3000);

    function send() {
        const n = document.getElementById('name').value;
        const t = document.getElementById('type').value;
        const c = document.getElementById('city').value;
        const msg = `تفعيل دارجي الجديد:%0Aالاسم: ${n}%0Aالفئة: ${t}%0Aالمحافظة: ${c}`;
        window.open(`https://wa.me/9647709094462?text=${msg}`);
    }
</script>
</body>
</html>
