<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b89c44; --bg: #001f3f; }
        body { background-color: var(--bg); font-family: 'Cairo', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .card { background: white; padding: 30px; border-radius: 30px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }

        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; font-family: 'Cairo'; box-sizing: border-box; }
        
        /* زر الجي بي اس */
        .gps-btn { background: #f0f0f0; color: #666; border: 2px dashed var(--gold); padding: 12px; border-radius: 12px; cursor: pointer; margin: 15px 0; transition: 0.3s; font-weight: bold; }
        .gps-active { background: #e7f5ea; color: #28a745; border: 2px solid #28a745; }

        /* زر الدخول الرئيسي */
        .login-btn { background: var(--gold); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; opacity: 0.4; pointer-events: none; transition: 0.5s; }
        .login-ready { opacity: 1; pointer-events: auto; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(184, 156, 68, 0.4); }
        
        .admin-link { margin-top: 20px; font-size: 12px; color: #aaa; cursor: pointer; display: block; }
    </style>
</head>
