<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق دارجي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: url('logo.png') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
        }
        .overlay { background: rgba(0, 31, 63, 0.85); position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .card { background: white; padding: 25px; border-radius: 25px; width: 90%; max-width: 380px; text-align: center; margin-top: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { width: 100px; border-radius: 15px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; font-family: 'Cairo'; text-align: center; }
        .btn-gps { background: #f8f9fa; border: 2px dashed #b89c44; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; margin: 10px 0; }
        .btn-main { background: #b89c44; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; opacity: 0.3; pointer-events: none; }
        .active { opacity: 1; pointer-events: auto; }
        .download-btn { background: white; color: #b89c44; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <a href="#" class="download-btn" onclick="alert('بدء تحميل تطبيق دارجي...')">📥 تحميل البرنامج</a>

    <div class="card" id="mainCard">
        <img src="logo.png" class="logo">
        <h2>تسجيل دخول دارجي</h2>
        <input type="text" id="uName" placeholder="الاسم الكامل">
        <input type="tel" id="uPhone" placeholder="رقم الهاتف">
        
        <select id="uType" onchange="toggleJob()">
            <option value="سائق">أنا سائق</option>
            <option value="أسطى">أنا أسطى (صاحب مهنة)</option>
        </select>

        <select id="uJob" style="display:none;">
            <option value="فيتر">فيتر (ميكانيكي)</option>
            <option value="بنجرجي">بنجرجي</option>
            <option value="تغيير زيوت">تغيير زيوت</option>
            <option value="حداد سيارات">حداد سيارات</option>
        </select>

        <div id="gpsBox" class="btn-gps" onclick="getLoc()">📍 تفعيل الجي بي اس</div>
        <button id="entryBtn" class="btn-main" onclick="finishReg()">دخول النظام</button>
        
        <p onclick="location.href='admin.html'" style="font-size:10px; color:#aaa; margin-top:10px; cursor:pointer;">دخول الإدارة</p>
    </div>

    <script>
        function toggleJob() {
            document.getElementById('uJob').style.display = (document.getElementById('uType').value === 'أسطى') ? 'block' : 'none';
        }

        let coords = "";
        function getLoc() {
            navigator.geolocation.getCurrentPosition(p => {
                coords = `${p.coords.latitude},${p.coords.longitude}`;
                document.getElementById('gpsBox').innerText = "تم تحديد موقعك ✅";
                document.getElementById('gpsBox').style.background = "#e8f5e9";
                document.getElementById('entryBtn').classList.add('active');
            }, () => alert("يرجى تفعيل الموقع"));
        }

        function finishReg() {
            const data = {
                name: document.getElementById('uName').value,
                phone: document.getElementById('uPhone').value,
                type: document.getElementById('uType').value,
                job: document.getElementById('uJob').value || "سائق",
                loc: coords
            };
            let db = JSON.parse(localStorage.getItem('darji_db') || "[]");
            db.push(data);
            localStorage.setItem('darji_db', JSON.stringify(db));
            
            // تحويل المستخدم لصفحة البرنامج الداخلية
            document.getElementById('mainCard').innerHTML = `<h3>أهلاً بك ${data.name}</h3><p>جاري فتح واجهة التطبيق الرئيسية...</p>`;
        }
    </script>
</body>
</html>
