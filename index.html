<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دارجي - دخول</title>
    <style>
        body { margin: 0; background: #002147; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: white; padding: 25px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { width: 100px; margin-bottom: 15px; border-radius: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .btn-entry { background: #b89344; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .error-msg { color: red; font-size: 12px; margin: 5px 0; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo.png" alt="دارجي" class="logo">
    <h2 style="color: #002147; margin: 0 0 15px 0;">تسجيل الدخول</h2>

    <input type="text" id="userName" placeholder="الاسم الكامل (مطلوب)">
    <input type="tel" id="userPhone" placeholder="رقم الهاتف (مطلوب)">
    
    <select id="userProvince">
        <option value="">اختر المحافظة (مطلوب)...</option>
        <option>ميسان</option><option>بغداد</option><option>البصرة</option><option>ذي قار</option>
        <option>النجف</option><option>كربلاء</option><option>بابل</option><option>الأنبار</option>
        <option>نينوى</option><option>واسط</option><option>صلاح الدين</option><option>ديالى</option>
    </select>

    <select id="userRole" onchange="toggleMech()">
        <option value="">حدد نوع الحساب (مطلوب)...</option>
        <option value="driver">أنا سائق</option>
        <option value="mechanic">أنا أسطى</option>
    </select>

    <div id="mechFields" class="hidden">
        <input type="text" id="shopName" placeholder="اسم المحل (مثل: محلات الأخوين)">
        <input type="text" id="shopAddress" placeholder="عنوان المحل (مثل: حي الحسين)">
        <select id="specialty">
            <option>فيتر</option><option>بنجرجي</option><option>كهربائي</option><option>مواد احتياطية</option>
        </select>
        <p id="gpsStatus" style="color:red; font-size:11px;">📍 بانتظار GPS لتثبيت موقع المحل...</p>
    </div>

    <button class="btn-entry" onclick="processLogin()">دخول النظام</button>
</div>

<script>
    let userLat = 0, userLng = 0;

    navigator.geolocation.getCurrentPosition(p => {
        userLat = p.coords.latitude; userLng = p.coords.longitude;
        const gpsLabel = document.getElementById('gpsStatus');
        if(gpsLabel) { gpsLabel.innerText = "✅ تم تحديد موقع المحل"; gpsLabel.style.color = "green"; }
    }, null, {enableHighAccuracy: true});

    function toggleMech() {
        const isMech = document.getElementById('userRole').value === 'mechanic';
        document.getElementById('mechFields').classList.toggle('hidden', !isMech);
    }

    function processLogin() {
        // جلب القيم
        const name = document.getElementById('userName').value.trim();
        const phone = document.getElementById('userPhone').value.trim();
        const province = document.getElementById('userProvince').value;
        const role = document.getElementById('userRole').value;

        // --- نظام الفحص الإجباري ---
        if (!name || !phone || !province || !role) {
            alert("⚠️ عذراً ستار، يجب ملئ كافة المربعات المطلوبة (الاسم، الهاتف، المحافظة، والنوع) قبل الدخول!");
            return; // توقف الكود هنا ولا يدخل للنظام
        }

        if (role === 'mechanic') {
            const shop = document.getElementById('shopName').value.trim();
            if (!shop) { alert("⚠️ كصاحب مهنة، يجب كتابة اسم المحل!"); return; }
            if (userLat === 0) { alert("⚠️ يرجى الانتظار ثانية واحدة حتى يلتقط الـ GPS موقع المحل!"); return; }
        }

        // إذا وصل الكود هنا، يعني كل شيء تمام
        const userData = {
            name: name,
            phone: phone,
            province: province,
            role: role,
            shop: document.getElementById('shopName').value || "محل شخصي",
            address: document.getElementById('shopAddress').value || "غير محدد",
            spec: document.getElementById('specialty').value,
            lat: userLat, lng: userLng
        };

        let users = JSON.parse(localStorage.getItem('users') || "[]");
        users.push(userData);
        localStorage.setItem('users', JSON.stringify(users));
        window.location.href = "main_app.html";
    }
</script>
</body>
</html>
