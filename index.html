<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل ديرتك - الإصدار الملكي الشامل</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #002d5b;
            --gold: #d4af37;
            --success: #28a745;
            --danger: #e74c3c;
            --warning: #ff9800;
            --bg: #f8f9fa;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #333; }
        .header { background: linear-gradient(135deg, var(--primary) 0%, #004a99 100%); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .container { max-width: 550px; margin: auto; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #eee; }
        h2 { color: var(--primary); border-bottom: 2px solid var(--gold); padding-bottom: 8px; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-reg { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(0,45,91,0.2); }
        
        /* تصميم كرت الأسطى الفخم */
        .worker-card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 18px; border-right: 8px solid var(--primary); box-shadow: 0 6px 15px rgba(0,0,0,0.04); transition: 0.3s; }
        .stars { color: var(--gold); font-size: 22px; margin: 10px 0; }
        .btn-call { display: block; background: var(--success); color: white; text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 10px; }
        .btn-map { display: block; background: var(--warning); color: white; text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 8px; }
        .comment-display { background: #f1f3f5; padding: 12px; border-radius: 10px; margin-top: 15px; border-right: 3px solid var(--gold); font-size: 14px; }
        
        /* لوحة الإدارة (ADM) */
        .admin-trigger { position: fixed; bottom: 25px; left: 25px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.3); border: 2px solid white; }
        #admin-panel { display: none; background: white; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; overflow-y: auto; padding: 30px; box-sizing: border-box; }
        .stat-banner { background: var(--primary); color: white; padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .delete-btn { background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        #reg-section, #profile-section { display: none; }
    </style>
</head>
<body>

<div class="admin-trigger" onclick="handleAdminLogin()">إدارة</div>

<div class="header">
    <h1 style="margin:0;">👷‍♂️ دليل ديرتك</h1>
    <p id="cloud-status">سحابة جوجل متصلة ✅</p>
</div>

<div class="container">
    <div id="reg-section" class="card">
        <h2 style="text-align:center;">تسجيل هوية جديدة ✨</h2>
        <input type="text" id="name" placeholder="الأسم الكامل (مثلاً: أسطى ستار)">
        <input type="tel" id="phone" placeholder="رقم الهاتف">
        <select id="city">
            <option value="">اختر المحافظة</option>
            <option>ميسان</option><option>بغداد</option><option>البصرة</option><option>ذي قار</option>
            <option>بابل</option><option>النجف</option><option>كربلاء</option><option>الأنبار</option>
            <option>نينوى</option><option>واسط</option><option>القادسية</option><option>المثنى</option>
            <option>ديالى</option><option>كركوك</option><option>صلاح الدين</option><option>أربيل</option>
            <option>سليمانية</option><option>دهوك</option>
        </select>
        <select id="user-type" onchange="toggleWorkerFields()">
            <option value="">نوع الحساب</option>
            <option value="worker">أسطى (صاحب مهنة)</option>
            <option value="driver">سائق (أبحث عن خدمة)</option>
        </select>

        <div id="worker-only-fields" style="display:none;">
            <input type="text" id="job" placeholder="المهنة (مثلاً: فيتر سيارات)">
            <input type="text" id="shop-name" placeholder="اسم المحل">
            <input type="text" id="area-name" placeholder="المنطقة أو الحي">
        </div>
        <button class="btn btn-reg" onclick="submitRegistration()">حفظ البيانات وتثبيت الموقع</button>
    </div>

    <div id="profile-section" class="card" style="text-align:center;">
        <h2 id="welcome-text">مرحباً بك</h2>
        <p>موقعك مسجل الآن في الخريطة السحابية</p>
        <button class="btn btn-reg" onclick="refreshGPS()">تحديث موقع المحل الآن (GPS)</button>
        <button onclick="performLogout()" style="background:none; border:none; color:red; margin-top:25px; cursor:pointer; font-weight:bold;">تسجيل خروج</button>
    </div>

    <h2 style="text-align:center; color: var(--primary);">دليل النشامى المتوفرين</h2>
    <div id="public-list"></div>
</div>

<div id="admin-panel">
    <button onclick="exitAdmin()" style="background:#eee; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">🔙 إغلاق اللوحة</button>
    <div class="stat-banner">
        <h1 id="total-count" style="margin:0; font-size:48px;">0</h1>
        <p>إجمالي المشتركين في السحابة</p>
    </div>
    <div id="admin-data-list"></div>
</div>

<script>
    // إعدادات سحابة جوجل (Firebase)
    const firebaseConfig = {
        apiKey: "AIzaSyDING7DzLK9YwWtdBt1CLJhFPOqRrCBo8s",
        authDomain: "darji-app-13348.firebaseapp.com",
        databaseURL: "https://darji-app-13348-default-rtdb.firebaseio.com",
        projectId: "darji-app-13348",
        storageBucket: "darji-app-13348.firebasestorage.app",
        messagingSenderId: "553323569740",
        appId: "1:553323569740:web:57075700fe68af3d010ae9"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // نظام الأمان والمدراء
    const adminKeys = { "satar1990": "full", "ahmed12345": "mod", "murtada54321": "mod", "ali98765": "mod", "jasim11223": "mod" };
    let currentPower = null;

    window.onload = () => {
        const storedUser = localStorage.getItem('satar_app_user');
        if (storedUser) {
            const u = JSON.parse(storedUser);
            document.getElementById('profile-section').style.display = 'block';
            document.getElementById('welcome-text').innerText = "أهلاً أسطى " + u.name;
        } else {
            document.getElementById('reg-section').style.display = 'block';
        }
        syncUsers();
    };

    function toggleWorkerFields() {
        const isWorker = document.getElementById('user-type').value === 'worker';
        document.getElementById('worker-only-fields').style.display = isWorker ? 'block' : 'none';
    }

    function submitRegistration() {
        const n = document.getElementById('name').value;
        const p = document.getElementById('phone').value;
        if(!n || !p) return alert("الرجاء كتابة الاسم والرقم");

        navigator.geolocation.getCurrentPosition((position) => {
            const userData = {
                name: n, phone: p,
                city: document.getElementById('city').value,
                type: document.getElementById('user-type').value,
                job: document.getElementById('job').value || "سائق",
                shop: document.getElementById('shop-name').value || "-",
                area: document.getElementById('area-name').value || "-",
                lat: position.coords.latitude,
                lng: position.coords.longitude
            };
            const newRef = database.ref('users').push();
            newRef.set(userData).then(() => {
                userData.id = newRef.key;
                localStorage.setItem('satar_app_user', JSON.stringify(userData));
                location.reload();
            });
        }, () => alert("يجب تفعيل الموقع GPS لحفظ بياناتك"));
    }

    function syncUsers() {
        database.ref('users').on('value', (snapshot) => {
            const mainList = document.getElementById('public-list');
            const adminList = document.getElementById('admin-data-list');
            mainList.innerHTML = ''; adminList.innerHTML = '';
            let count = 0;

            snapshot.forEach((child) => {
                const val = child.val();
                count++;
                if (val.type === 'worker') {
                    mainList.innerHTML += `
                        <div class="worker-card">
                            <h3 style="color:var(--primary); margin:0;">الأسطى ${val.name} (${val.job})</h3>
                            <div class="stars">⭐⭐⭐⭐⭐ (5/5)</div>
                            <p>📍 ${val.city} - ${val.area} | 🏪 ${val.shop}</p>
                            <a href="tel:${val.phone}" class="btn-call">📞 إتصال هاتفي</a>
                            <a href="https://www.google.com/maps?q=${val.lat},${val.lng}" target="_blank" class="btn-map">📍 فتح الموقع على الخريطة</a>
                            <div class="comment-display">
                                <b>التعليقات:</b> "شغله درجة أولى وأنصح به"
                                <textarea placeholder="اكتب تقييمك للأسطى..." style="height:50px; margin-top:10px;"></textarea>
                                <button class="btn btn-reg" style="padding:8px; font-size:14px; width:100px;">إرسال</button>
                            </div>
                        </div>`;
                }
                adminList.innerHTML += `
                    <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                        <span><b>${val.name}</b> (${val.job})<br><small>${val.phone}</small></span>
                        ${currentPower ? `<button class="delete-btn" onclick="deleteUserRecord('${child.key}')">حذف نهائي</button>` : ''}
                    </div>`;
            });
            document.getElementById('total-count').innerText = count;
        });
    }

    function handleAdminLogin() {
        const pass = prompt("أدخل رمز الإدارة:");
        if (adminKeys[pass]) {
            currentPower = adminKeys[pass];
            document.getElementById('admin-panel').style.display = 'block';
            syncUsers();
        } else { alert("الرمز غير صحيح!"); }
    }

    function deleteUserRecord(key) {
        if(confirm("هل أنت متأكد من حذف هذا الشخص من السحابة؟")) {
            database.ref('users/' + key).remove();
        }
    }

    function exitAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    function performLogout() { localStorage.clear(); location.reload(); }
    
    function refreshGPS() {
        const local = JSON.parse(localStorage.getItem('satar_app_user'));
        navigator.geolocation.getCurrentPosition((p) => {
            database.ref('users/' + local.id).update({ lat: p.coords.latitude, lng: p.coords.longitude });
            alert("تم تحديث موقعك في سحابة جوجل!");
        });
    }
</script>
</body>
</html>
