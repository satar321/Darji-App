<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دارجي - دخول النظام</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            margin: 0; padding: 0;
            background: #002147; /* الخلفية الزرقاء التي طلبتها */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .login-card {
            background: white; padding: 30px; border-radius: 25px;
            width: 90%; max-width: 400px; text-align: center;
        }
        .logo { width: 100px; margin-bottom: 20px; }
        input, select {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 1px solid #ddd; border-radius: 10px; background: #f9f9f9;
        }
        .btn-entry {
            background: #b89344; color: white; border: none;
            padding: 15px; width: 100%; border-radius: 10px; font-size: 18px;
        }
        .admin-btn {
            display: block; margin-top: 20px; padding: 10px;
            background: #e0e0e0; color: #002147; text-decoration: none;
            border-radius: 10px; font-weight: bold;
        }
        .install-link {
            display: block; margin-top: 15px; color: #008080;
            text-decoration: underline; cursor: pointer; font-size: 14px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo.png" alt="دارجي" class="logo">
    <h2 style="color: #002147;">مرحباً بك في دارجي</h2>
    
    <input type="text" placeholder="الاسم الكامل">
    <input type="text" placeholder="رقم الهاتف (الواتساب)">
    
    <select>
        <option>أنا سائق</option>
        <option>أنا صاحب ورشة</option>
    </select>

    <button class="btn-entry">دخول النظام</button>
    
    <div id="installArea" style="display:none;">
        <span class="install-link" id="installBtn">📥 تحميل التطبيق على الشاشة الرئيسية</span>
    </div>

    <a href="admin.html" class="admin-btn">⚙️ لوحة تحكم الأدمن</a>
</div>

<script>
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installArea').style.display = 'block';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt = null;
        }
    });
</script>

</body>
</html>
