<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دارجي - الدخول</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; padding: 0; background: #002147; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: white; padding: 25px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow-y: auto; max-height: 95vh; }
        .logo { width: 100px; margin-bottom: 15px; border-radius: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; }
        .btn-entry { background: #b89344; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo.png" alt="دارجي" class="logo">
    <h2 style="color: #002147;">تسجيل الدخول</h2>

    <input type="text" id="userName" placeholder="الاسم الكامل">
    <input type="tel" id="userPhone" placeholder="رقم الهاتف">
    
    <select id="userProvince">
        <option value="">اختر المحافظة...</option>
        <option>ميسان</option>
        <option>بغداد</option>
        <option>البصرة</option>
        <option>ذي قار</option>
        <option>النجف</option>
        <option>كربلاء</option>
        <option>بابل</option>
        <option>الأنبار</option>
        <option>نينوى</option>
        <option>القادسية</option>
        <option>المثنى</option>
        <option>واسط</option>
        <option>صلاح الدين</option>
        <option>ديالى</option>
        <option>كركوك</option>
        <option>أربيل</option>
        <option>السليمانية</option>
        <option>دهوك</option>
    </select>

    <select id="userRole" onchange="toggleSpecialty()">
        <option value="driver">أنا سائق</option>
        <option value="mechanic">أنا أسطى</option>
    </select>

    <div id="mechanicOptions" class="hidden">
        <select id="specialty">
            <option value="">حدد مهنتك...</option>
            <option>فيتر</option>
            <option>بنجرجي</option>
            <option>مواد احتياطية</option>
            <option>محل زيوت</option>
            <option>غسل سيارات</option>
        </select>
    </div>

    <button class="btn-entry" onclick="saveAndGo()">دخول النظام</button>
</div>

<script>
    function toggleSpecialty() {
        const role = document.getElementById('userRole').value;
        document.getElementById('mechanicOptions').classList.toggle('hidden', role !== 'mechanic');
    }

    function saveAndGo() {
        const data = {
            name: document.getElementById('userName').value,
            phone: document.getElementById('userPhone').value,
            province: document.getElementById('userProvince').value,
            role: document.getElementById('userRole').value,
            specialty: document.getElementById('specialty').value,
            time: new Date().toLocaleString()
        };

        if(!data.name || !data.province) { alert("أكمل البيانات"); return; }

        // حفظ في ذاكرة البرنامج لكي يظهر في الصفحة الثانية
        let allUsers = JSON.parse(localStorage.getItem('allUsers') || "[]");
        allUsers.push(data);
        localStorage.setItem('allUsers', JSON.stringify(allUsers));
        localStorage.setItem('currentUser', JSON.stringify(data));

        window.location.href = "main_app.html";
    }
</script>
</body>
</html>
