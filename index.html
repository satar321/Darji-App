<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق دارجي - النسخة الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #001f3f url('logo.png') no-repeat center center fixed; 
            background-size: contain; 
            font-family: 'Cairo', sans-serif; margin: 0; color: white;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .overlay { background: rgba(0, 31, 63, 0.95); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .card { background: white; color: #333; padding: 20px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-main { background: #b89c44; color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* واجهة الخريطة والطلبات */
        .map-box { background: #e3f2fd; height: 150px; border-radius: 15px; margin: 10px 0; display: flex; align-items: center; justify-content: center; color: #001f3f; font-weight: bold; border: 2px solid #b89c44; }
        .ad-box { background: #fff3e0; border: 1px dashed #ff9800; padding: 10px; border-radius: 12px; margin-top: 15px; text-align: right; }
        .status-badge { background: #4caf50; color: white; padding: 2px 10px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <div class="card" id="regPage">
        <img src="logo.png" style="width:80px; border-radius:15px;">
        <h2 style="color:#001f3f; margin:10px 0;">تسجيل في دارجي</h2>
        <input type="text" id="uName" style="width:100%; padding:10px; margin:5px 0; border-radius:8px; border:1px solid #ddd; text-align:center;" placeholder="الاسم الكامل">
        <select id="uType" style="width:100%; padding:10px; margin:5px 0; border-radius:8px; border:1px solid #ddd; text-align:center;">
            <option value="أسطى">أنا أسطى (صاحب مهنة)</option>
            <option value="سائق">أنا سائق (أريد مساعدة)</option>
        </select>
        <button class="btn-main" onclick="goToDashboard()">دخول النظام</button>
    </div>

    <div class="card" id="dashPage" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0; color:#001f3f;">لوحة التحكم</h3>
            <span class="status-badge">متصل الآن ✅</span>
        </div>
        
        <div class="map-box" id="mapArea">
            📍 جاري تحديد موقع الزبائن القريبين...
        </div>

        <div style="text-align:right; margin-top:10px;">
            <b style="color:#001f3f;">📩 طلبات الصيانة الواردة:</b>
            <div style="background:#f9f9f9; padding:10px; border-radius:10px; margin-top:5px; font-size:14px; color:#666;">
                لا توجد طلبات عمل حالياً في منطقتك.
            </div>
        </div>

        <div class="ad-box">
            <b style="color:#e65100;">📢 عروض الزيوت (إعلان):</b>
            <p style="font-size:13px; margin:5px 0;">خصم 20% على زيوت شل للمشتركين في دارجي! <br><small>تواصل مع الإدارة للإعلان هنا.</small></p>
        </div>

        <button class="btn-main" style="background:#cc0000; margin-top:20px;" onclick="location.reload()">تسجيل خروج</button>
    </div>

    <script>
        function goToDashboard() {
            const name = document.getElementById('uName').value;
            if(!name) return alert("يرجى إدخال الاسم");

            // إخفاء صفحة التسجيل وإظهار لوحة التحكم
            document.getElementById('regPage').style.display = 'none';
            document.getElementById('dashPage').style.display = 'block';
            
            // محاكاة الخريطة
            setTimeout(() => {
                document.getElementById('mapArea').innerHTML = "🗺️ خريطة حية: تم العثور على 3 زبائن بالقرب منك";
            }, 2000);
        }
    </script>
</body>
</html>
