<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل ديرتك - نظام الإدارة الشامل</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'دليل ديرتك الشامل','short_name':'ديرتك','start_url':'/','display':'standalone','background_color':'#002d5b','theme_color':'#002d5b','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/1042/1042390.png','sizes':'512x512','type':'image/png'}]}">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #002d5b;
            --gold: #d4af37;
            --success: #28a745;
            --danger: #e74c3c;
            --bg: #f8f9fa;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }

        /* شريط تحميل التطبيق */
        #install-bar { 
            display: none; 
            background: var(--gold); 
            color: var(--primary); 
            padding: 15px; 
            text-align: center; 
            font-weight: bold; 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 10000; 
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .header { 
            background: linear-gradient(135deg, var(--primary), #004a99); 
            color: white; 
            padding: 50px 20px; 
            text-align: center; 
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .container { max-width: 600px; margin: -30px auto 0; padding: 20px; }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
        }

        input, select, textarea { 
            width: 100%; padding: 15px; margin: 10px 0; 
            border: 1px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; 
        }

        .btn { 
            width: 100%; padding: 18px; border: none; border-radius: 12px; 
            font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; 
        }

        .btn-main { background: var(--primary); color: white; }

        /* كروت العرض */
        .worker-card { 
            background: white; padding: 20px; border-radius: 15px; 
            border-right: 8px solid var(--primary); margin-bottom: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* لوحة الإدارة المطورة */
        #admin-panel { 
            display: none; background: #fff; position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 9999; overflow-y: auto; padding: 20px; box-sizing: border-box; 
        }

        .admin-item { 
            background: #f9f9f9; padding: 20px; border-radius: 15px; 
            margin-bottom: 15px; border: 1px solid #eee; font-size: 14px; 
        }

        .location-info { 
            background: #eef2f7; padding: 10px; border-radius: 8px; 
            margin-top: 10px; color: #555; border: 1px solid #d1d9e6;
        }

        .tag-driver { background: #3498db; color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; }
        .tag-worker { background: #9b59b6; color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; }

        .admin-trigger { 
            position: fixed; bottom: 20px; left: 20px; 
            width: 60px; height: 60px; background: var(--primary); 
            color: white; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; cursor: pointer; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 1000; 
        }

        #reg-section, #profile-section { display: none; }
    </style>
</head>
<body>

<div id="install-bar" onclick="installApp()">📥 اضغط هنا لتحميل تطبيق "دليل ديرتك" على هاتفك</div>

<div class="admin-trigger" onclick="openAdmin()">إدارة</div>

<div class="header">
    <h1>👷‍♂️ دليل ديرتك</h1>
    <p>نظام ميسان لإدارة المهن والسواق</p>
</div>

<div class="container">
    <div id="reg-section" class="card">
        <h2 style="text-align:center;">تسجيل جديد</h2>
        <input type="text" id="in-name" placeholder="الأسم الكامل">
        <input type="tel" id="in-phone" placeholder="رقم الهاتف">
        <select id="in-city">
            <option>ميسان</option><option>بغداد</option><option>البصرة</option>
        </select>
        <select id="in-type" onchange="toggleJob()">
            <option value="driver">سائق</option>
            <option value="worker">صاحب مهنة</option>
        </select>
        <div id="job-fields" style="display:none;">
            <input type="text" id="in-job" placeholder="المهنة">
            <input type="text" id="in-shop" placeholder="اسم المحل">
            <input type="text" id="in-area" placeholder="المنطقة">
        </div>
        <button class="btn btn-main" onclick="saveUser()">حفظ وتثبيت الموقع</button>
    </div>

    <div id="profile-section" class="card" style="text-align:center;">
        <h2 id="hello-user">أهلاً بك</h2>
        <button class="btn btn-main" onclick="updateLoc()">تحديث الموقع الآن</button>
        <button onclick="logout()" style="margin-top:20px; background:none; border:none; color:red; cursor:pointer;">خروج</button>
    </div>

    <h2 style="text-align:center; color: var(--primary);">قائمة المهنيين</h2>
    <div id="display-list"></div>
</div>

<div id="admin-panel">
    <button onclick="closeAdmin()" style="padding:10px 20px; border-radius:10px; border:none; background:#eee; cursor:pointer;">🔙 إغلاق</button>
    <div style="text-align:center; background: var(--primary); color:white; padding:20px; border-radius:15px; margin:20px 0;">
        <h1 id="count" style="margin:0;">0</h1>
        <p>إجمالي المشتركين</p>
    </div>
    <div id="admin-list"></div>
</div>

<script>
    // تهيئة Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDING7DzLK9YwWtdBt1CLJhFPOqRrCBo8s",
        authDomain: "darji-app-13348.firebaseapp.com",
        databaseURL: "https://darji-app-13348-default-rtdb.firebaseio.com",
        projectId: "darji-app-13348",
        storageBucket: "darji-app-13348.firebasestorage.app",
        messagingSenderId: "553323569740",
        appId: "1:553323569740:web:57075700fe68af3d010ae9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // إدارة زر التحميل
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-bar').style.display = 'block';
    });

    function installApp() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choice) => {
            if (choice.outcome === 'accepted') document.getElementById('install-bar').style.display = 'none';
        });
    }

    window.onload = () => {
        const user = localStorage.getItem('app_user');
        if (user) {
            document.getElementById('profile-section').style.display = 'block';
            document.getElementById('hello-user').innerText = "أهلاً " + JSON.parse(user).name;
        } else {
            document.getElementById('reg-section').style.display = 'block';
        }
        loadData();
    };

    function toggleJob() {
        document.getElementById('job-fields').style.display = (document.getElementById('in-type').value === 'worker') ? 'block' : 'none';
    }

    function saveUser() {
        const name = document.getElementById('in-name').value;
        const phone = document.getElementById('in-phone').value;
        if(!name || !phone) return alert("املأ الحقول");

        navigator.geolocation.getCurrentPosition((pos) => {
            const uData = {
                name, phone,
                city: document.getElementById('in-city').value,
                type: document.getElementById('in-type').value,
                job: document.getElementById('in-job').value || "-",
                shop: document.getElementById('in-shop').value || "-",
                area: document.getElementById('in-area').value || "-",
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                time: new Date().toLocaleString()
            };
            const ref = db.ref('users').push();
            ref.set(uData).then(() => {
                uData.id = ref.key;
                localStorage.setItem('app_user', JSON.stringify(uData));
                location.reload();
            });
        });
    }

    let isAdmin = false;
    function loadData() {
        db.ref('users').on('value', (snap) => {
            const dList = document.getElementById('display-list');
            const aList = document.getElementById('admin-list');
            dList.innerHTML = ''; aList.innerHTML = '';
            let c = 0;
            snap.forEach((child) => {
                const v = child.val(); c++;
                if (v.type === 'worker') {
                    dList.innerHTML += `<div class="worker-card">
                        <h3>${v.name} (${v.job})</h3>
                        <p>📍 ${v.city} - ${v.area}</p>
                        <a href="tel:${v.phone}" class="btn btn-main" style="display:block; text-align:center; text-decoration:none;">إتصال</a>
                        <a href="https://www.google.com/maps?q=${v.lat},${v.lng}" target="_blank" style="display:block; margin-top:10px; text-align:center;">فتح الموقع على الخريطة</a>
                    </div>`;
                }
                // عرض بيانات الموقع كاملة للأدمن
                aList.innerHTML += `<div class="admin-item">
                    <span class="${v.type === 'driver' ? 'tag-driver' : 'tag-worker'}">${v.type === 'driver' ? 'سائق' : 'مهني'}</span>
                    <h3 style="margin:10px 0;">${v.name} | ${v.phone}</h3>
                    <p><b>المدينة:</b> ${v.city} | <b>المنطقة:</b> ${v.area}</p>
                    <div class="location-info">
                        <b>إحداثيات الموقع الكاملة:</b><br>
                        خط العرض: ${v.lat}<br>
                        خط الطول: ${v.lng}<br>
                        <b>وقت التسجيل:</b> ${v.time}
                    </div>
                    ${isAdmin ? `<button onclick="del('${child.key}')" style="background:red; color:white; border:none; padding:8px; border-radius:5px; margin-top:10px; cursor:pointer;">حذف الحساب</button>` : ''}
                </div>`;
            });
            document.getElementById('count').innerText = c;
        });
    }

    function openAdmin() {
        const p = prompt("رمز الدخول:");
        if (p === "satar1990") { isAdmin = true; document.getElementById('admin-panel').style.display = 'block'; loadData(); }
        else alert("خطأ!");
    }

    function del(k) { if(confirm("حذف؟")) db.ref('users/'+k).remove(); }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    function logout() { localStorage.clear(); location.reload(); }
    function updateLoc() {
        const u = JSON.parse(localStorage.getItem('app_user'));
        navigator.geolocation.getCurrentPosition((p) => {
            db.ref('users/'+u.id).update({ lat: p.coords.latitude, lng: p.coords.longitude });
            alert("تم التحديث!");
        });
    }
</script>
</body>
</html>
