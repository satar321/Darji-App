<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دارجي - الدليل العراقي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        #splash {
            position: fixed; width: 100%; height: 100%; top:0; left:0;
            background: #001f3f; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        #splash img { width: 150px; border-radius: 15px; }
        
        body {
            background-color: #001f3f; font-family: 'Cairo', sans-serif; margin: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .card {
            background: #ffffff; padding: 30px; border-radius: 30px;
            width: 90%; max-width: 380px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-top: 8px solid #b89c44;
        }
        /* تعديل لعرض الصورة بشكل صحيح */
        .main-logo { width: 120px; height: auto; margin-bottom: 15px; border-radius: 12px; display: block; margin-left: auto; margin-right: auto; }
        
        h1 { color: #001f3f; font-size: 22px; margin: 10px 0; }
        input, select {
            width: 100%; padding: 14px; margin-bottom: 15px;
            border-radius: 12px; border: 1px solid #ddd; font-family: 'Cairo'; box-sizing: border-box;
        }
        .btn-send {
            background: #b89c44; color: white; border: none; padding: 15px;
            border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>

<div id="splash">
    <img src="logo.png" alt="تحميل...">
</div>

<div class="card">
    <img src="logo.png" class="main-logo" onerror="this.src='1000164438.png'" alt="شعار دارجي">
    
    <h1>تطبيق دارجي العراقي</h1>
    <p style="color: #666; font-size: 14px;">دليلك الأول للميكانيك</p>
    
    <input type="text" id="username" placeholder="الاسم الكامل">
    <select id="usercity">
        <option>ميسان</option><option>بغداد</option><option>البصرة</option>
    </select>
    <button class="btn-send" onclick="active()">تفعيل عبر واتساب</button>
</div>

<script>
    setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 2000);
    function active() {
        const name = document.getElementById('username').value;
        const city = document.getElementById('usercity').value;
        if(!name) { alert("أدخل اسمك"); return; }
        window.open(`https://wa.me/9647709094462?text=تفعيل دارجي:%0Aالاسم: ${name}%0Aالمحافظة: ${city}`);
    }
</script>
</body>
</html>
